<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>deptTreeTab fragment</title></head>
<body>
<th:block th:fragment="content">
<div class="sb-card">

    <!-- 검색 툴바 -->
    <div class="sb-toolbar">
        <div th:if="${not #lists.isEmpty(companies)}" class="sb-field">
            <select id="filterCom" style="min-width:200px" onchange="sbDeptComChange(this.value)">
                <option value="">회사 선택 (필수)</option>
                <option th:each="comp : ${companies}"
                        th:value="${comp.comId}"
                        th:selected="${com != null and comp.comId == com.comId}"
                        th:text="${comp.comName}"></option>
            </select>
        </div>

        <!-- 검색 -->
        <div class="ac-wrap" style="max-width:320px; flex:1 1 auto">
            <div class="sb-field sb-field--search" style="width:100%">
                <i class="bi bi-search"></i>
                <input type="text" id="deptSearch" placeholder="부서명 또는 코드 검색" autocomplete="off" style="width:100%" />
            </div>
            <div class="ac-list" id="acList"></div>
        </div>
        <div class="grow"></div>

        <span class="text-faint" id="deptCount" style="font-size:12.5px"></span>
        <!-- [추가] 일반 사용자에게는 등록 버튼 숨김 -->
        <a th:href="@{/dept/add(comId=${com != null ? com.comId : null})}"
           sec:authorize="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')"
           class="btn btn-sb btn-sm"><i class="bi bi-plus-lg"></i> 부서 등록</a>
    </div>

    <!-- 테이블 -->
    <div class="sb-card__body--flush">
        <div th:if="${com == null or com.comId == null}" class="sb-empty" id="noComPrompt">
            <i class="bi bi-building"></i>
            <p>조회할 회사를 선택하세요.</p>
            <p style="font-size:12.5px;margin-top:4px">회사명은 필수 검색 조건입니다.</p>
        </div>

        <table class="sb-table" id="deptTable"
               th:style="${(com == null or com.comId == null)} ? 'display:none' : ''">
            <thead>
                <tr>
                    <th style="width:60px">NO</th>
                    <th style="min-width:180px">부서명</th>
                    <th style="width:80px">코드</th>
                    <th style="width:130px">상위부서</th>
                    <th style="width:130px">부서장</th>
                    <th class="num" style="width:72px">인원</th>
                    <th style="width:80px; text-align:center">관리</th>
                </tr>
            </thead>
            <tbody id="deptRows">
                <tr th:each="dept, i : ${items}"
                    th:with="lv=${dept.depth},
                             lvClass=${lv == 0} ? 'dept-row-lv1' : (${lv == 1} ? 'dept-row-lv2' : (${lv == 2} ? 'dept-row-lv3' : 'dept-row-lv4'))"
                    th:class="${lvClass}"
                    th:attr="data-id=${dept.deptId}, data-parentid=${dept.parentId}, data-name=${dept.deptName}, data-code=${dept.deptCode}, data-depth=${dept.depth}, data-empcount=${dept.empCount}">
                    <td class="sb-hr-cell tnum" th:text="${i.index + 1}"></td>
                    <td class="dept-name-col">
                        <div class="dept-cell-name">
                            <i th:class="${lv == 0} ? 'bi bi-building-fill dept-depth-icon' : (${lv >= 1} ? 'bi bi-chevron-right dept-depth-icon' : 'bi bi-diagram-3 dept-depth-icon')"
                               th:style="${lv == 0} ? 'color:var(--sb-accent)' : ''"></i>
                            <div>
                                <span class="dept-name-text" th:text="${dept.deptName}"></span>
                                <span th:if="${dept.parentId != 0}" class="text-faint ms-1" style="font-size:11.5px"
                                      th:text="'↳ ' + ${dept.parentName}"></span>
                                <span th:unless="${dept.parentId != 0}" class="sb-badge sb-badge--blue ms-1"
                                      style="font-size:10.5px;padding:1px 7px">최상위</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="dept-code-chip" th:text="${dept.deptCode}"></span></td>
                    <td class="text-faint" style="font-size:13px">
                        <span th:if="${dept.parentId != 0}" th:text="${dept.parentName}"></span>
                        <span th:unless="${dept.parentId != 0}" class="text-faint">—</span>
                    </td>
                    <td style="font-size:13px">
                        <span th:if="${not #strings.isEmpty(dept.leaderName)}" th:text="${dept.leaderName}"></span>
                        <span th:unless="${not #strings.isEmpty(dept.leaderName)}" class="text-faint">—</span>
                    </td>
                    <td class="num tnum" th:text="${dept.empCount} + '명'"></td>
                    <td>
                        <div class="d-flex justify-content-end gap-1">
                            <a class="sb-iconbtn"
                               th:href="@{/dept/detail(deptId=${dept.deptId})}"
                               title="상세보기">
                                <i class="bi bi-book"></i>
                            </a>
                            <a th:href="@{/dept/edit(deptId=${dept.deptId}, comId=${com != null ? com.comId : null})}"
                               sec:authorize="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')"
                               class="sb-iconbtn" title="수정">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="sb-iconbtn dept-del"
                                    sec:authorize="hasAuthority('ROOT') or hasRole('ADMIN')"
                                    th:attr="data-id=${dept.deptId}, data-name=${dept.deptName}"
                                    style="color:var(--sb-red)"
                                    title="삭제">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="sb-empty" id="deptEmpty" style="display:none">
            <i class="bi bi-diagram-3"></i>
            <p>일치하는 부서가 없습니다.</p>
        </div>
    </div>

    <!-- 하단 정보 -->
    <div th:if="${com != null and com.comId != null}"
         class="px-3 py-2 d-flex align-items-center gap-2"
         style="border-top:1px solid var(--sb-border); font-size:12px; color:var(--sb-ink-faint)">
        <i class="bi bi-info-circle"></i>
        <span>총 <b id="deptTotal" th:text="${#lists.size(items)}"></b>개 부서 · <code style="font-size:11px">상위 부서</code> 기준 트리 구조로 표시됩니다.</span>
    </div>
</div>

<!-- ══════════════════════════════════════════════
     삭제 확인 모달 — fragments/dept/deptDeleteModal.html 로 분리
     (프로젝트의 실제 fragment 경로/템플릿 위치에 맞게 th:replace 경로를 조정하세요)
     ON DELETE CASCADE → 하위 부서도 함께 삭제됨 / 소속사원 있으면 부서 해체 마법사로 진입
══════════════════════════════════════════════ -->
<div th:replace="~{dept/modal/deleteModal :: deleteModal}"></div>

<!-- 이 스크립트엔 서버 EL이 전혀 없어서(전부 data-* 속성/DOM 조작 기반) th:inline 없이 그대로 사용 가능 -->
<script>
(function () {
  "use strict";

  /* ── 회사 변경 시 페이지 새로고침(서버 재조회) ── */
  window.sbDeptComChange = function (comId) {
    var url = new URL(window.location.href);
    if (comId) { url.searchParams.set("comId", comId); }
    else { url.searchParams.delete("comId"); }
    window.location.href = url.toString();
  };

  /* ── 클라이언트 필터(검색 + depth) : 이미 렌더된 행을 보여줬다 숨겼다 함 ── */
  var rows = Array.prototype.slice.call(document.querySelectorAll("#deptRows tr"));

  function applyFilter() {
    var q     = (document.getElementById("deptSearch") || {}).value || "";
    var depth = (document.getElementById("filterDepth") || {}).value || "";
    q = q.trim().toLowerCase();

    var visible = 0;
    rows.forEach(function (tr) {
      var name = (tr.dataset.name || "").toLowerCase();
      var code = (tr.dataset.code || "").toLowerCase();
      var d    = tr.dataset.depth;
      var hitQ     = !q || name.indexOf(q) > -1 || code.indexOf(q) > -1;
      var hitDepth = !depth || d === depth;
      var show = hitQ && hitDepth;
      tr.style.display = show ? "" : "none";
      if (show) visible++;
    });

    var countEl = document.getElementById("deptCount");
    if (countEl) countEl.textContent = visible + "건";
    var emptyEl = document.getElementById("deptEmpty");
    var tableEl = document.getElementById("deptTable");
    if (emptyEl && tableEl) {
      emptyEl.style.display = visible ? "none" : "";
      tableEl.style.display = visible ? "" : "none";
    }
  }

  /* ── 자동완성 ── */
  var acIndex = -1;
  function renderAc() {
    var input = document.getElementById("deptSearch");
    var ac     = document.getElementById("acList");
    if (!input || !ac) return;
    var q = input.value.trim().toLowerCase();
    if (!q) { ac.classList.remove("show"); return; }

    var matches = rows.filter(function (tr) {
      var name = (tr.dataset.name || "").toLowerCase();
      var code = (tr.dataset.code || "").toLowerCase();
      return name.indexOf(q) > -1 || code.indexOf(q) > -1;
    }).slice(0, 6);

    acIndex = -1;
    if (!matches.length) {
      ac.innerHTML = '<div class="ac-empty">\'' + input.value + '\'와(과) 일치하는 부서가 없습니다.</div>';
      ac.classList.add("show");
      return;
    }
    ac.innerHTML = matches.map(function (tr) {
      var name = tr.dataset.name, code = tr.dataset.code;
      var idx = name.toLowerCase().indexOf(q);
      var hl = name;
      if (idx >= 0) {
        hl = name.slice(0, idx) + "<b>" + name.slice(idx, idx + q.length) + "</b>" + name.slice(idx + q.length);
      }
      return '<div class="ac-item" data-name="' + name + '">' +
        '<i class="bi bi-diagram-3 text-faint"></i>' +
        '<span>' + hl + '</span>' +
        '<span class="ac-item__meta">' + code + '</span></div>';
    }).join("");
    ac.classList.add("show");
    ac.querySelectorAll(".ac-item").forEach(function (it) {
      it.addEventListener("click", function () {
        input.value = it.dataset.name;
        ac.classList.remove("show");
        applyFilter();
      });
    });
  }

  var searchInput = document.getElementById("deptSearch");
  if (searchInput) {
    searchInput.addEventListener("input", function () { renderAc(); applyFilter(); });
    searchInput.addEventListener("keydown", function (e) {
      var items = Array.prototype.slice.call(document.querySelectorAll("#acList .ac-item"));
      if (!items.length) return;
      if (e.key === "ArrowDown")       { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); }
      else if (e.key === "ArrowUp")    { e.preventDefault(); acIndex = Math.max(acIndex - 1, 0); }
      else if (e.key === "Enter" && acIndex >= 0) { e.preventDefault(); items[acIndex].click(); return; }
      else return;
      items.forEach(function (it, i) { it.classList.toggle("active", i === acIndex); });
    });
    document.addEventListener("click", function (e) {
      if (!e.target.closest(".ac-wrap")) {
        var ac = document.getElementById("acList");
        if (ac) ac.classList.remove("show");
      }
    });
  }
  var depthSel = document.getElementById("filterDepth");
  if (depthSel) depthSel.addEventListener("change", applyFilter);

  applyFilter();

  /* ── 삭제 모달 오픈 : list.html의 delDept(id) 패턴과 동일하게
       이벤트 위임으로 .dept-del 버튼에 바인딩, data-* 속성에서 정보 읽음 ──

       [부서 해체 마법사 연동 — 서버 로직과 반드시 일치시킬 것]
       1) 하위부서 존재 → 서버(dao.countChildren)에서 IllegalStateException 으로 삭제 자체를 막음.
          → 모달 단계에서 아예 확인 버튼을 숨겨 애초에 실패할 요청을 보내지 않는다.
       2) 하위부서 없음 + 소속사원 0명 → 즉시 삭제 (/dept/delete, real delete)
       3) 하위부서 없음 + 소속사원 1명 이상 → 서버가 dept_status='PENDING_DELETE' 로 변경 후
          사원 이관 목록 화면으로 리다이렉트. 버튼 클릭 자체는 2)와 동일하게 /dept/delete 로
          제출하고, 실제 어떤 처리를 할지는 서버 응답(redirect)에 맡긴다 — 모달은 클릭 전에
          사용자가 "이관 화면으로 넘어간다"는 것만 미리 안내한다. */
  function openDelModal(tr) {
    var deptId   = tr.dataset.id;
    var deptName = tr.dataset.name;
    var empCount = +tr.dataset.empcount || 0;
    /* 하위부서 존재 여부 — 새 DB 컬럼 없이, 이미 화면에 있는 전체 행의 parentId만 스캔 */
    var childRows  = rows.filter(function (other) { return other.dataset.parentid === deptId; });
    var hasChild   = childRows.length > 0;

    var headerEl      = document.getElementById("deptDelHeaderLabel");
    var iconBoxEl     = document.getElementById("deptDelIconBox");
    var mainWarnEl    = document.getElementById("deptDelMainWarning");
    var childWarnEl   = document.getElementById("deptDelChildWarn");
    var childWarnText = document.getElementById("deptDelChildWarnText");
    var empWarnEl     = document.getElementById("deptDelEmpWarn");
    var empWarnTextEl = document.getElementById("deptDelEmpWarnText");
    var cancelBtn     = document.getElementById("deptDelCancelBtn");
    var yesBtn        = document.getElementById("deptDelYes");
    var yesIconEl     = document.getElementById("deptDelYesIcon");
    var yesLabelEl    = document.getElementById("deptDelYesLabel");

    document.getElementById("deptDelName").textContent = deptName;

    if (hasChild) {
      /* ① 차단 상태 — 서버에서도 막히는 요청이므로 아예 보내지 않는다 */
      headerEl.innerHTML   = '<i class="bi bi-slash-circle me-1"></i>삭제할 수 없습니다';
      headerEl.style.color = "var(--sb-red)";
      iconBoxEl.style.background = "var(--sb-red-soft)";
      iconBoxEl.style.color      = "var(--sb-red)";
      iconBoxEl.innerHTML        = '<i class="bi bi-slash-circle"></i>';
      mainWarnEl.innerHTML =
        '이 부서에는 하위 부서가 <b>' + childRows.length + '</b>개 존재합니다.<br>' +
        '하위 부서를 먼저 삭제하거나 다른 부서로 이동한 뒤 다시 시도해주세요.';

      childWarnEl.style.display = "";
      childWarnText.innerHTML = '하위 부서가 있는 동안에는 삭제(해체)를 진행할 수 없습니다.';
      empWarnEl.style.display = "none";

      cancelBtn.textContent = "닫기";
      yesBtn.style.display = "none"; /* 실패할 요청이므로 확인 버튼 자체를 숨김 */
    } else if (empCount > 0) {
      /* ② 이관이 필요한 케이스 — 경고성(amber) 톤으로 전환 */
      yesBtn.style.display = "";
      headerEl.innerHTML   = '<i class="bi bi-people-fill me-1"></i>사원 이관이 필요합니다';
      headerEl.style.color = "var(--sb-amber)";
      iconBoxEl.style.background = "var(--sb-amber-soft)";
      iconBoxEl.style.color      = "var(--sb-amber)";
      iconBoxEl.innerHTML        = '<i class="bi bi-people-fill"></i>';
      mainWarnEl.innerHTML =
        '삭제를 진행하면 부서 상태가 <b>이관 대기(PENDING_DELETE)</b>로 변경되고,<br>' +
        '바로 사원 이관 화면으로 이동합니다.';

      childWarnEl.style.display = "none";
      empWarnEl.style.display = "";
      empWarnTextEl.innerHTML =
        '소속 사원 <b>' + empCount + '</b>명을 다른 부서로 이관해야 최종 삭제가 완료됩니다.';

      cancelBtn.textContent = "취소";
      yesBtn.style.background = "var(--sb-amber)";
      yesBtn.style.borderColor = "var(--sb-amber)";
      yesIconEl.className = "bi bi-arrow-right-circle";
      yesLabelEl.textContent = "이관 진행";
    } else {
      /* ③ 소속 사원 0명, 하위부서 없음 — 즉시 삭제 */
      yesBtn.style.display = "";
      headerEl.innerHTML   = '<i class="bi bi-shield-exclamation me-1"></i>부서 삭제';
      headerEl.style.color = "var(--sb-red)";
      iconBoxEl.style.background = "var(--sb-red-soft)";
      iconBoxEl.style.color      = "var(--sb-red)";
      iconBoxEl.innerHTML        = '<i class="bi bi-diagram-3-fill"></i>';
      mainWarnEl.innerHTML =
        '삭제 시 연결된 데이터에 영향을 줄 수 있습니다.<br>이 작업은 되돌릴 수 없습니다.';

      childWarnEl.style.display = "none";
      empWarnEl.style.display = "none";

      cancelBtn.textContent = "취소";
      yesBtn.style.background = "var(--sb-red)";
      yesBtn.style.borderColor = "var(--sb-red)";
      yesIconEl.className = "bi bi-trash3";
      yesLabelEl.textContent = "삭제 확인";
    }

    var modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("deptDelModal"));
    yesBtn.onclick = function () {
      document.getElementById("deleteDeptId").value = deptId;
      document.getElementById("deleteForm").submit();
    };
    modal.show();
  }

  rows.forEach(function (tr) {
    var btn = tr.querySelector(".dept-del");
    if (btn) btn.addEventListener("click", function () { openDelModal(tr); });
  });
})();
</script>
</th:block>
</body>
</html>
