<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout.html}">
<head>
	<title>결재 양식 관리</title>
</head>
<body>

<main layout:fragment="content">
<div class="sb-content">
	<div class="sb-page-head">
		<div class="sb-page-head__txt">
			<div class="sb-breadcrumb">
				<a th:href="@{/appr/list_form}">전자결재</a>
				<i class="bi bi-chevron-right"></i>
				<span>양식 관리</span>
			</div>
			<h1>결재 양식 상세조회</h1>
			<p>결재 양식의 상세 정보를 확인합니다.</p>
		</div>
		<div class="sb-page-head__actions">
			<button type="button" class="btn btn-ghost"
					th:onclick="|location.href='@{/appr/list_form}'|">
					목록으로
			</button>
		</div>
	</div>
	
	<div class="row g-8">
		<div class="col-lg-9">
			<div class="sb-card">
				<div class="sb-card__head">
					<h2>기본 정보</h2>
				</div>
				
				<div class="sb-card__body">
					<div class="row g-4 mb-4">
						<div class="col-md-6">
							<label class="sb-form-label">양식 코드</label>
							<input type="text" class="form-control-plaintext fw-semibold text-dark px-2 bg-light border rounded"
								   th:value="${dto.forCode}" readonly />
						</div>
						<div class="col-md-6">
							<label class="sb-form-label">회사</label>
							<div class="sb-search" style="max-width: 100%; background-color: #f8f9fa;">
								<i class="bi bi-building"></i>
								<input type="text" class="form-control-plaintext text-dark ps-5" 
									   th:value="${dto.comName}" readonly />
							</div>
						</div>
					</div>

					<div class="row g-4 mb-4">
						<div class="col-md-6">
							<label class="sb-form-label">양식 제목</label>
							<input type="text" class="form-control-plaintext text-dark px-2 bg-light border rounded"
								   th:value="${dto.forTitle}" readonly />
							</div>
						<div class="col-md-6">
							<label class="sb-form-label">활성화 여부</label>
							<div class="form-check form-switch mt-2">
								<input class="form-check-input sb-checkbox" type="checkbox" 
									   style="width: 40px; height: 20px;"
									   th:checked="${dto.forStatus}" disabled>
								<label class="form-check-label text-dark fw-semibold ms-2" style="user-select: none;"
									   th:text="${dto.forStatus} ? '활성화' : '비활성화' ">
								</label>
							</div>
						</div>
					</div>

					<div class="mb-4">
						<label class="sb-form-label">양식 내용</label>
						<textarea class="form-control" rows="14" 
								  style="font-family: 'Courier New', Courier, monospace; background-color: #fafafa; resize: none;" 
								  th:text="${dto.forContent}"
								  readonly></textarea>
					</div>
					
					<div class="sb-divider"></div>
					
					<div class="d-flex justify-content-end gap-2">
						<button type="button" class="btn btn-ghost" 
								th:onclick="|location.href='@{/appr/list_form}'|">
								목록으로
						</button>
						<button type="button" class="btn btn-sb" 
								th:onclick="|location.href='@{/appr/update_form(forId=${dto.forId})}'|">
								<i class="bi bi-pencil-square"></i> 수정하기
						</button>
					</div>
				</div>
			</div>
		</div>

		<div class="col-lg-3">
			<div class="sb-card mb-4">
				<div class="sb-card__head">
					<h2>양식 상세 정보</h2>
				</div>
				
				<div class="sb-card__body">
					<div class="d-flex justify-content-between border-bottom pb-2 mb-2">
						<span class="text-soft font-size-13">양식 ID</span>
						<span class="fw-750 tnum" th:text="${dto.forId}"></span>
					</div>
					<div class="d-flex justify-content-between border-bottom pb-2 mb-2">
						<span class="text-soft font-size-13">생성일</span>
						<span class="fw-600 tnum text-dark" th:text="${dto.forCreated}"></span>
					</div>
					<div class="d-flex justify-content-between border-bottom pb-2 mb-2">
						<span class="text-soft font-size-13">수정일</span>
						<span class="fw-600 tnum text-dark" th:text="${dto.forUpdated}"></span>
					</div>
					<div class="d-flex justify-content-between align-items-center">
						<span class="text-soft font-size-13">사용 여부</span>
						<span class="sb-badge"
							  th:classappend="${dto.forStatus} ? 'sb-badge--green' : 'sb-badge--gray'">
							<span class="pip"></span>
							<th:block th:text="${dto.forStatus} ? '활성화' : '비활성화'"></th:block>
						</span>
					</div>
				</div>

				<div class="sb-card__body bg-light border-top">
					<div class="d-flex gap-2 align-items-start">
						<i class="bi bi-info-circle-fill text-primary mt-1"></i>
						<p class="m-0 text-soft" style="font-size: 12px;">
							생성일과 수정일은 시스템에서 자동으로 관리됩니다.
						</p>
					</div>
				</div>
			</div>
		</div>
	</div>	
</div>

</main>
</body>
</html>
