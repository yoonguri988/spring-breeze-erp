<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout.html}">
<head>
	<title>전자결재 문서함</title>
</head>
<body>

<main layout:fragment="content">
<div class="sb-content">
	
	<!-- 페이지 헤더 -->
	<div class="sb-page-head">
		<div class="sb-page-head__txt">
			<div class="sb-breadcrumb">
				<a th:href="@{/appr/list_doc}">전자결재</a>
				<i class="bi bi-chevron-right"></i>
				<span>결재 문서함</span>
			</div>
			<h1>결재 문서 조회</h1>
			<p>내가 기안/결재한 문서 및 결재 대기 중인 문서를 확인합니다.</p>
		</div>
		<div class="sb-page-head__actions">
			<button type="button" class="btn btn-sb" th:onclick="|loaction.href='@{appr/write_doc}'|">
				<i class="bi bi-pencil-square"></i> 새 결재 기안
			</button>
		</div>
	</div>
	
	<!-- 문서 상태별 대시보드 / 이부분도 백단위 만들면 th:text 기입 -->
	<div class="row g-3 mb-4">
	
		<div class="col-12 col-md-3">
			<div class="sb-card h-100 p-3 d-flex align-item center">
				<div class="rounded-3 p-3 bg-primary-subtle text-primary me-3 d-flex align-items-center justify-content-center"
					 style="width: 54px; height: 54px;">
				<i class="bi bi-folder2-open fs-3"></i>
				</div>
				<div>
					<div class="text-muted small fw-medium mb-1">전체 문서</div>
					<div class="fs-4 fw-bold text-dark">
						<span class="tnum">24</span>
						<span class="fs-6 fw-normal text-secondary">건</span>
					</div>
				</div>
			</div>
		</div>
		
		<div class="col-12 col-md-3">
			<div class="sb-card h-100 p-3 d-flex align-item center">
				<div class="rounded-3 p-3 bg-warning-subtle text-warning me-3 d-flex align-items-center justify-content-center"
					 style="width: 54px; height: 54px;">
				<i class="bi bi-hourglass-split fs-3"></i>
				</div>
				<div>
					<div class="text-muted small fw-medium mb-1">대기 (WAI)</div>
					<div class="fs-4 fw-bold text-dark">
						<span class="tnum">24</span>
						<span class="fs-6 fw-normal text-secondary">건</span>
					</div>
				</div>
			</div>
		</div>
		
		<div class="col-12 col-md-3">
			<div class="sb-card h-100 p-3 d-flex align-item center">
				<div class="rounded-3 p-3 bg-success-subtle text-success me-3 d-flex align-items-center justify-content-center"
					 style="width: 54px; height: 54px;">
				<i class="bi bi-check-lg fs-3"></i>
				</div>
				<div>
					<div class="text-muted small fw-medium mb-1">승인 (APR)</div>
					<div class="fs-4 fw-bold text-dark">
						<span class="tnum">24</span>
						<span class="fs-6 fw-normal text-secondary">건</span>
					</div>
				</div>
			</div>
		</div>
		
		<div class="col-12 col-md-3">
			<div class="sb-card h-100 p-3 d-flex align-item center">
				<div class="rounded-3 p-3 bg-danger-subtle text-danger me-3 d-flex align-items-center justify-content-center"
					 style="width: 54px; height: 54px;">
				<i class="bi bi-x-lg fs-3"></i>
				</div>
				<div>
					<div class="text-muted small fw-medium mb-1">전체 문서</div>
					<div class="fs-4 fw-bold text-dark">
						<span class="tnum">24</span>
						<span class="fs-6 fw-normal text-secondary">건</span>
					</div>
				</div>
			</div>
		</div>
		
	</div>
	
	<!-- 상단 검색바 -->
	<div class="sb-card mb-4">
		<div class="sb-toolbar">
			<div class="sb-field sb-field--search">
				<i class="bi bi-search"></i>
				<input type="text" id="searchKeyword"
					   placeholder="문서 번호, 제목, 기안자 검색"/>
			</div>
			<div class="sb-header__spacer"></div>
			<div class="sb-field">
				<select class="form-select" id="searchStatus">
					<option value="">전체 상태</option>
					<option value="WAI">대기</option>
					<option value="PRO">진행</option>
					<option value="APP">승인</option>
					<option value="REJ">반려</option>
				</select>
			</div>
		</div>
	</div>
	
	<!-- 탭 메뉴 / 백 단위 처리하고 타임리프 구문 추가해야함-->
	<div class="sb-tabs">
		<div class="sb-tab active" data-tab="tab-my-history">
			<i class="bi bi-archive-fill"></i> 내가 결재했던 모든 문서
			<span class="sb-nav__badge bg-secondary text-white"></span>
		</div>
		<div class="sb-tab" data-tab="tab-my-todo">
			<i class="bi bi-file-earmark-check-fill"></i> 내가 결재해야 할 문서
			<span class="sb-nav__badge"></span>
		</div>
	</div>
</div>

</main>
</body>
</html>
