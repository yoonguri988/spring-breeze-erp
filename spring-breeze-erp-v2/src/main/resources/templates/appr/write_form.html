<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout.html}">
<head>
	<title>결재 양식 관리</title>
	<link rel="stylesheet" th:href="@{/css/summernote-lite.min.css}"/>
</head>
<body>

<main layout:fragment="content">
<div class="sb-content">
	 <div class="sb-page-head">
	 	<div class="sb-page-head__txt">
	 		<div class="sb-breadcrumb">
		 		<a th:href="@{/appr/list_form}">전자결재</a>
		 		<i class="bi bi-chevron-right"></i>
		 		<span>양식 관리</span>
	 		</div>
	 		<h1>결재 양식 작성</h1>
	 		<p>새로운 결재 양식을 등록합니다.</p>
	 	</div>
	 	<div class="sb-page-head__actions">
		 	<button type="button" class="btn btn-ghost"
		 			th:onclick="|location.href='@{/appr/list_form}'|">
		 			목록으로
		 	</button>
	 	</div>
	 </div>

	<form th:action="@{/appr/write_form}" method="post" onsubmit="return checkForm()">
		<input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
	
		<div class="sb-card">
			<div class="sb-card__head">
				<h2>기본 정보</h2>
			</div>
			
			<div class="sb-card__body">	
				<div class="row g-4 mb-4">
					<div class="col-md-6">
						<label for="forCode"
							   class="sb-form-label">양식 코드</label>
						<input type="text"
							   class="form-control"
							   id="forCode" name="forCode" placeholder="ex) TEST-01"/>
						<div id="err_forCode" class="text-danger fw-semibold mt-1"
							 style="display: none; font-size: 14px;">
							 양식 코드를 입력해주세요
						</div>
						<div class="text-secondary fw-semibold mt-1 tforCode"
							 style="font-size: 14px;">
						</div>
					</div>

					<div class="col-md-6 position-relative">	
						<label for="comName"
							   class="sb-form-label">양식 추가할 회사</label>
							<div class="sb-search">
								<i class="bi bi-building"></i>
								<input type="text" id="comName"
								   placeholder="회사이름 입력" autocomplete="off"/>
						</div>	
							<input type="hidden" id="comId" name="comId" />
						<div id="err_comId" class="text-danger fw-semibold mt-1"
							 style="display: none; font-size: 14px;">
							 추가할 회사를 선택해주세요
						</div>
						<div class="ac-list" id="companyDropdown"></div>
						
					</div>
				</div>
					
				<div class="row g-4 mb-4">
					<div class="col-md-6">
						<label for="forTitle" class="sb-form-label">양식 제목</label>
						<input type="text" class="form-control"
							   id="forTitle" name="forTitle" placeholder="ex) 병가신청서"/>
						<div class="form-text text-faint mt-1">결재 양식의 제목을 입력하세요.</div>
						<div id="err_forTitle" class="text-danger fw-semibold mt-1"
							 style="display: none; font-size: 14px;">
							 양식 제목을 입력해주세요
						</div>
					</div>
					<div class="col-md-6">
						<label class="sb-form-label">활성화 여부</label>
						<div class="form-check form-switch mt-2">
							<input class="form-check-input sb-checkbox"
								   type="checkbox" id="forStatus" name="forStatus"
								   style="width: 40px; height: 20px;">
							<label class="form-check-label text-dark fw-semibold ms-2"
								   for="forStatus"
								   style="cursor: pointer; user-select: none;">활성화</label>
						</div>
					</div>
				</div>
				
				<div class="mt-4">
					<label for="forContent" class="sb-form-label">양식 내용</label>
					<div class="mb-2 d-flex gap-2 align-items-center">
						<label class="sb-form-label mb-0">추천 양식 프레임 주입</label>
						<button type="button" class="btn btn-sm btn-outline-primary"
								onclick="injectTemplate('leave')">휴가 신청서</button>
						<button type="button" class="btn btn-sm btn-outline-primary"
								onclick="injectTemplate('expense')">지출 결의서</button>
						<button type="button" class="btn btn-sm btn-outline-primary"
								onclick="injectTemplate('biz')">일반 기안서</button>
					</div>
					<textarea name="forContent" rows="10" cols="40"
						      class="form-control" id="forContent"></textarea>							  		 
					<div class="form-text text-faint mt-2">결재 양식의 내용을 작성하세요.</div>
					<div id="err_forContent" class="text-danger fw-semibold mt-1"
							 style="display: none; font-size: 14px;">
							 양식 내용을 입력해주세요
					</div>
				</div>
				
				<div class="sb-divider"></div>
				
				<div class="d-flex justify-content-end gap-2">
					<button type="button" class="btn btn-ghost"
							th:onclick="|location.href='@{/appr/list_form}'|">
							취소
					</button>
					<button type="submit" class="btn btn-sb">
							작성
					</button>
				</div>
			</div>
		</div>
	</form>
	
	<!-- jquery 로드 -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	
	<!-- js파일 로드 -->
	<script th:src="@{/js/summernote-lite.min.js}"></script>
	
	<script>
	/////////////////////////////// 웹 에디터 ///////////////////////////////
	
		(function(){
			// 제이쿼리, 써머노트 메모리에 등록될때까지 확인
			var initTimer = setInterval(function(){
				if (typeof window.jQuery !== 'undefined' && window.jQuery.fn.summernote){
					clearInterval(initTimer);
					
					// 써머노트 에디터 구동
					window.jQuery('#forContent').summernote({
						placeholder: '양식 내용을 입력해 주세요.',
						tabsize: 2,
						height: 350,
						toolbar:[
							['style',['style']],
							['font', ['bold', 'italic', 'underline', 'clear']],
							['color', ['color']],
							['para', ['ul', 'ol', 'paragraph']],
							['table', ['table']],
							['insert', ['link', 'picture']],
							['view', ['fullscreen', 'codeview']]
						]
					});
				}
			}, 50);
		})();
	
	/////////////////////////////// 웹 에디터 ///////////////////////////////
	</script>
	
</div>


<script>

	/////////////////////////////// 양식 주입 ///////////////////////////////
	
	// 템플릿 문자열 정의
	const templates = {
		// 휴가 신청서
		leave: `
		<div class="appr-table-wrap">
			<table class="appr-table">
				<tbody>
					<tr>
						<th colspan="4" style="font-size: 20px; padding: 15px; background-color: #e93cef;">휴 가 신 청 서</th>
					</tr>
					<tr>
						<td class="appr-title-cell">휴가 종류</td>
						<td>(연차 / 오전반차 / 오후반차 / 공가 / 병가) 중 기입</td>
						<td class="appr-title-cell">비상 연락처</td>
						<td>010-</td>
					</tr>
					<tr>
						<td class="appr-title-cell">기간</td>
						<td colspan="3">2026년 __월 __일 ~ 2026년 __월 __일 (총 __일간)</td>
					</tr>
					<tr>
						<td class="appr-title-cell">휴가 사유</td>
						<td colspan="3" style="height: 150px; vertical-align: top;">
							<p>※ 구체적인 휴가 사유를 입력해 주세요.</p>
						</td>
					</tr>
					<tr>
						<td colspan="4" style="text-align: center; color: #666; font-size: 12px; background-colot: #fafafa;">
							위와 같이 휴가를 신청하오니 승인하여 주시기 바랍니다.
						</td>
					</tr>
				</tbody>
			</table>
		</div>
		`,
		// 지출 결의서
		expense: `
		<div class="appr-table-wrap">
		    <table class="appr-table">
		        <tbody>
		            <tr>
		                <th colspan="5" style="font-size: 20px; padding: 15px; background-color: #e9ecef;">지 출 결 의 서</th>
		            </tr>
		            <tr>
		                <td class="appr-title-cell">회계 구분</td>
		                <td>(법인카드 / 개인환급 / 세금계산서)</td>
		                <td class="appr-title-cell">총 지출 금액</td>
		                <td colspan="2" style="font-weight: bold; color: #0d6efd;">금 ________________ 원정 (₩               )</td>
		            </tr>
		            <tr>
		                <th style="width: 30%;">지출 내역 (적요)</th>
		                <th style="width: 20%;">수량</th>
		                <th style="width: 20%;">단가</th>
		                <th style="width: 20%;">금액</th>
		                <th style="width: 10%;">비고</th>
		            </tr>
		            <tr>
		                <td style="height: 35px;">예) 사무실 탕비실 비품 구매</td>
		                <td style="text-align: center;">1</td>
		                <td style="text-align: right;">50,000</td>
		                <td style="text-align: right;">50,000</td>
		                <td></td>
		            </tr>
		            <tr>
		                <td style="height: 35px;"></td>
		                <td></td>
		                <td></td>
		                <td></td>
		                <td></td>
		            </tr>
		            <tr>
		                <td class="appr-title-cell" style="text-align: center;">합계</td>
		                <td></td>
		                <td></td>
		                <td style="text-align: right; font-weight: bold;">50,000</td>
		                <td></td>
		            </tr>
		        </tbody>
		    </table>
		</div>
		`,
		// 일반 기안서
		biz: `
		<div class="appr-table-wrap">
		    <table class="appr-table">
		        <tbody>
		            <tr>
		                <th colspan="2" style="font-size: 20px; padding: 15px; background-color: #e9ecef;">기 안 / 품 의 서</th>
		            </tr>
		            <tr>
		                <td class="appr-title-cell">기안 제목</td>
		                <td style="font-weight: bold;">[기안 제목을 입력하세요]</td>
		            </tr>
		            <tr>
		                <td class="appr-title-cell">시행 일자</td>
		                <td>2026년 __월 __일</td>
		            </tr>
		            <tr>
		                <td class="appr-title-cell" style="height: 250px; vertical-align: top;">기안 내용</td>
		                <td style="vertical-align: top;">
		                    <p><strong>1. 목적 및 배경</strong></p>
		                    <p>- 내용을 입력하세요.</p>
		                    <p>&nbsp;</p>
		                    <p><strong>2. 주요 골자 (상세 내용)</strong></p>
		                    <p>- 내용을 입력하세요.</p>
		                    <p>&nbsp;</p>
		                    <p><strong>3. 기대 효과 및 결론</strong></p>
		                    <p>- 내용을 입력하세요.</p>
		                </td>
		            </tr>
		        </tbody>
		    </table>
		</div>
		`
	};
	
	// 양식 주입 버튼 클릭시 안내
	function injectTemplate(type){
		if(confirm("선택한 결재 템플릿을 불러 오시겠습니까?")){
			// 제이쿼리로 서머노트에 html코드를 직접 주입
			window.jQuery('#forContent').summernote('code', templates[type]);
		}
	}
	
	/////////////////////////////// 양식 주입 ///////////////////////////////

let valid = false; // 강제 입력시 막아줄 전역 변수

	/////////////////////////////// 빈칸 처리 ///////////////////////////////
	
	function checkForm(){
		// 빈칸 체크할 요소들 매핑 {key : value}
		// 아래처럼 매핑 안하면 일일이 하나씩 getElementById 를써서 비교하고 변경해야함
		const fields = [
			{ id: "forCode", errId: "err_forCode"},
			{ id: "forTitle", errId: "err_forTitle"},
			{ id: "comId", errId: "err_comId", focusId: "comName"},
			{ id: "forContent", errId: "err_forContent"}
		];
		
		let result = true;
		let focusElement = null;
		
		// 에러 초기화
		fields.forEach(field => {
			let id = document.getElementById(field.id);
			let errId = document.getElementById(field.errId);
			
			// 테두리 제거
			id.classList.remove("is-invalid");
			if(field.focusId){
				document.getElementById(field.focusId).classList.remove("is-invalid");
			}
			
			// 에러 구문 제거
			if(errId){
				errId.style.display = "none";
			}
			
			// 비어있는 값 체크
			if(id.value.trim() == ""){
				if(field.focusId){
					document.getElementById(field.focusId).classList.add("is-invalid");
				}
				else{
					id.classList.add("is-invalid");
				}
				
				if(errId) {
					errId.style.display = "block";
				}
				if(!focusElement){
					focusElement = field.focusId ? document.getElementById(field.focusId) : id;
				}
				
				result = false;
			}
			
		});
		// 양식 중복 인데 강제로 작성 눌렀을시 제어
		if(!result){
			if(focusElement){
				focusElement.focus();
			}
				return false;
		}

		if(!valid){
			alert("중복된 양식코드는 사용할수 없습니다.");
			document.getElementById("forCode").focus();
			return false;
		}

		return true;

	}
	
	/////////////////////////////// 빈칸 처리 ///////////////////////////////
	
	
	/////////////////////////////// 양식 중복 처리 ///////////////////////////////
	
	window.addEventListener("load", function(){
		let forCode = document.getElementById("forCode"); // forCode 가져오기
		let tforCode = document.querySelector(".tforCode"); // 입력 결과 출력할 부분 가져오기
		
		// 입력할때마다 호출 
		forCode.addEventListener("keyup", function(e){
			let value = e.target.value.trim(); // 빈칸제외 forCode의 입력값 가져오기
			
			// 양식 중복 검색할 회사 값 가져오기
			let comIdElement = document.getElementById("comId");
			let comIdVal = comIdElement ? comIdElement.value.trim() : "" ;
			
			valid = false; // 초기화
			
			// 양식 검사에 회사의 id값이 필요해 먼저 하도록 유도
			if(comIdVal === ""){
				tforCode.textContent = "양식을 추가할 회사를 먼저 검색하여 선택해주세요.";
				tforCode.className = "text-danger fw-semibold mt-1 tforCode";
				forCode.classList.remove("is-valid");
				forCode.classList.add("is-invalid");
				return;
			}
			
			if(value !== ""){
				fetch(`/checkCode?code=${encodeURIComponent(value)}&comId=${encodeURIComponent(comIdVal)}`)
				.then( response => response.json() )
				.then( data => {
					
					// 초기화
					tforCode.className = "fw-semibold mt-1 tforCode";
	                forCode.classList.remove("is-valid", "is-invalid");
	                
					if(data.checkCode){
						tforCode.textContent = "사용 가능한 양식코드 입니다" ;
						tforCode.classList.add("valid-feedback");
						forCode.classList.add("is-valid");
						valid = true;
					}
					else{
						tforCode.textContent = "중복된 양식코드 입니다" ;
						tforCode.classList.add("invalid-feedback");
						forCode.classList.add("is-invalid");
						valid = false;
					}
				}).catch( err => {
					tforCode.textContent = "서버 오류" ;
					tforCode.classList.add("invalid-feedback");
					forCode.classList.add("is-invalid");
					valid = false;
				})
			}
			else{
				tforCode.textContent = "";
				tforCode.className = "tforCode";
				forCode.classList.remove("is-valid", "is-invalid");
				valid = false;
			}
		})
	})
	
	/////////////////////////////// 양식 중복 처리 ///////////////////////////////
	
	
	/////////////////////////////// 회사 이름 검색 ///////////////////////////////
	
	window.addEventListener("load", function(){
		
		let companySearch = document.getElementById("comName");
		let comId = document.getElementById("comId");
		let companyDropdown = document.getElementById("companyDropdown");
		
		// 입력 할때마다 실행
		companySearch.addEventListener("keyup", function(e){
			let value = e.target.value.trim();
			
			if(value !== "") {
				// 데이터를 /searchCompany 경로에 company라는 이름으로 보냄
				fetch(`/searchCompany?company=${encodeURIComponent(value)}`)
				.then(response => response.json())
				.then(data => {
					companyDropdown.innerHTML = ""; // 기존 목록 비우기
					
					if(data && data.length > 0){
						companyDropdown.style.display = "block";
						
						data.forEach(item => {
							let btn = document.createElement("button");
							btn.type = "button";
							btn.className = "dropdown-item d-flex justify-content-between align-items-center";
							
							// 태그 생성
							let nameSpan = document.createElement("span");
							// 생성된 태그에 클래스 추가
							nameSpan.className = "company-name";
							// 회사이름
							btn.textContent = item.comName;
							
							// 위와 동일, 사업자 번호 파트
							let bizSpan = document.createElement("span");
							bizSpan.className = "text-muted small ms-2";
							bizSpan.textContent = item.bizNo;
							
							// 삽입
							btn.appendChild(nameSpan);
							btn.appendChild(bizSpan);
							
							// 검색해서 나온 회사 이름 클릭
							btn.addEventListener("click", function(){
								companySearch.value = item.comName; // 회사이름 넣기
								comId.value = item.comId; // insert구문 실행위해 com_id 값 넣기
								companyDropdown.style.display = "none"; // 드롭다운 닫기
							});
							companyDropdown.appendChild(btn);
						});
					}
					else{ // 검색결과 없을때
						companyDropdown.innerHTML = "<span class='dropdown-item text-muted disabled'>검색 결과가 없습니다.</span>";
						companyDropdown.style.display = "block";
					}
				})
				.catch(error => {
					console.error("회사 검색 오류:",error);
					companyDropdown.style.display = "none";
				});
			}
			else{ // 입력란 비어있을때 처리
				comId.value = "";
				companyDropdown.innerHTML = "";
				companyDropdown.style.display = "none";
				
			}
		});
		// 입력창 외부공간 클릭시 정리
		document.addEventListener("click", function(e){
			if(e.target !== companySearch && e.target !== companyDropdown){
				companyDropdown.style.display = "none";
			}
		});
	});
	
	/////////////////////////////// 회사 이름 검색 ///////////////////////////////
</script>
</main>
</body>
</html>
