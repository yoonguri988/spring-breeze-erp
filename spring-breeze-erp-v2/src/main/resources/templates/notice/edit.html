<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>공지 수정</title>
</head>
<body>
<th:block layout:fragment="content">
<script th:inline="javascript">
window.addEventListener("load", function(){
    let result = /*[[${result}]]*/ '';
    console.log(result);

    if(result=="글 수정 실패"){ alert(result); history.go(-1); }
    else if (result.length!=0){ alert(result); }
});
</script>

<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb">
      <a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i>
      업무 <i class="bi bi-chevron-right"></i>
      <a th:href="@{/notice/list}">공지 관리</a> <i class="bi bi-chevron-right"></i>
      공지 수정
    </div>
    <h1>공지 수정</h1>
    <p>등록된 공지사항의 내용을 수정합니다.</p>
  </div>
</div>

<div class="sb-card mb-3">
  <div class="sb-card__body">
    <form id="noticeEditForm"
          th:action="@{/notice/edit(bno=${dto.bno})}"
          method="post"
          enctype="multipart/form-data"
          onsubmit="return checkForm()">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="row g-3">
        <div class="col-12">
          <label for="btitle" class="sb-form-label">제목</label>
          <input type="text" class="form-control" id="btitle" name="btitle"
                 th:value="${dto.btitle}" required>
        </div>

        <div class="col-12">
          <label for="bcontent" class="sb-form-label">내용</label>
          <textarea class="form-control" id="bcontent" name="bcontent" rows="5"
                    th:text="${dto.bcontent}" required></textarea>
        </div>

        <!--
          dto.bfile은 이제 FileUploadUtil이 만들어준 fileUrl(예: /upload/notice/attach/xxxx.pdf) 그대로다.
          "bfile"이라는 이름의 폼 필드로 다시 제출할 필요는 없다 — 새 파일을 안 올리면
          컨트롤러에서 dto.bfile을 건드리지 않고, 매퍼의 <if test="bfile != null ...">가
          알아서 DB의 기존 값을 그대로 유지해주기 때문. 여기서는 미리보기 용도로만 보여준다.
        -->
        <div class="col-12"
             th:if="${dto.bfile != null and !#strings.isEmpty(dto.bfile)}"
             th:with="attExt=${#strings.toLowerCase(#strings.substringAfter(dto.bfile,'.'))}">
          <label class="sb-form-label">기존 첨부파일</label>
          <div class="mt-1">
            <img th:if="${attExt == 'png' or attExt == 'jpg' or attExt == 'jpeg' or attExt == 'gif' or attExt == 'webp'}"
                 th:src="@{${dto.bfile}}" th:alt="${dto.btitle}"
                 class="img-fluid rounded" style="max-width:200px">

            <a th:unless="${attExt == 'png' or attExt == 'jpg' or attExt == 'jpeg' or attExt == 'gif' or attExt == 'webp'}"
               th:href="@{${dto.bfile}}" class="btn btn-sb-soft btn-sm" target="_blank" rel="noopener">
                <i class="bi bi-paperclip"></i>
                현재 첨부파일 보기 (<span th:text="${'.' + attExt}"></span>)
            </a>
          </div>
          <div class="form-text">새 파일을 첨부하면 기존 첨부파일은 교체(삭제)됩니다.</div>
        </div>

        <div class="col-12">
          <label for="file" class="sb-form-label">파일 첨부</label>
          <input type="file" id="file" name="file" class="form-control"
                 accept=".png,.jpg,.jpeg,.gif,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.hwp,.hwpx,.zip">
          <div class="form-text">이미지 · pdf · office 문서 · hwp · zip, 최대 10MB</div>
        </div>
      </div>

      <div class="sb-form-actions mt-4 text-end">
        <button type="reset" class="btn btn-ghost">취소</button>
        <a th:href="@{/notice/list}" class="btn btn-sb-soft">목록</a>
        <button type="submit" class="btn btn-sb"><i class="bi bi-pencil-square"></i> 수정</button>
      </div>
    </form>
  </div>
</div>
</main>

<script>
function checkForm(){
    let btitle = document.getElementById("btitle");
    let bcontent = document.getElementById("bcontent");
    if(btitle.value.trim() == ""){ alert("빈칸입니다.\n제목을 입력해주세요."); btitle.focus(); return false; }
    if(bcontent.value.trim() == ""){ alert("빈칸입니다.\n내용을 입력해주세요."); bcontent.focus(); return false; }
    return true;
}
</script>
</th:block>
</body>
</html>
