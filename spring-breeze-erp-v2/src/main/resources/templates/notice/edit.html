<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>공지 수정</title>
</head>
<body>
<th:block layout:fragment="content">
<script th:inline="javascript">
window.addEventListener("load", function(){
    let result = /*[[${result}]]*/ '';
    console.log(result);

    if(result=="글 수정 실패"){ alert(result); history.go(-1); }
    else if (result.length!=0){ alert(result); }
});
</script>

<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb">
      <a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i>
      업무 <i class="bi bi-chevron-right"></i>
      <a th:href="@{/notice/list}">공지 관리</a> <i class="bi bi-chevron-right"></i>
      공지 수정
    </div>
    <h1>공지 수정</h1>
    <p>등록된 공지사항의 내용을 수정합니다.</p>
  </div>
</div>

<div class="sb-card mb-3">
  <div class="sb-card__body">
    <form id="noticeEditForm"
          th:action="@{/notice/edit(bno=${dto.bno})}"
          method="post"
          enctype="multipart/form-data"
          onsubmit="return checkForm()">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="row g-3">
        <div class="col-12">
          <label for="btitle" class="sb-form-label">제목</label>
          <input type="text" class="form-control" id="btitle" name="btitle"
                 th:value="${dto.btitle}" required>
        </div>

        <div class="col-12">
          <label for="bcontent" class="sb-form-label">내용</label>
          <textarea class="form-control" id="bcontent" name="bcontent" rows="5"
                    th:text="${dto.bcontent}" required></textarea>
        </div>

        <div class="col-12" th:if="${dto.bfile != null and !#strings.isEmpty(dto.bfile)}">
          <label for="bfile" class="sb-form-label">기존파일</label>
          <input type="text" id="bfile" name="bfile"
                 th:value="${dto.bfile}" readonly class="form-control">
        </div>

        <div class="col-12" th:if="${dto.bfile != null and !#strings.isEmpty(dto.bfile)}">
          <img th:src="@{'/upload/' + ${dto.bfile}}" th:alt="${dto.btitle}"
               class="img-fluid" style="max-width:200px">
        </div>

        <div class="col-12">
          <label for="file" class="sb-form-label">파일 첨부</label>
          <input type="file" id="file" name="file" class="form-control">
        </div>
      </div>

      <div class="sb-form-actions mt-4 text-end">
        <button type="reset" class="btn btn-ghost">취소</button>
        <a th:href="@{/notice/list}" class="btn btn-sb-soft">목록</a>
        <button type="submit" class="btn btn-sb"><i class="bi bi-pencil-square"></i> 수정</button>
      </div>
    </form>
  </div>
</div>
</main>

<script>
function checkForm(){
    let btitle = document.getElementById("btitle");
    let bcontent = document.getElementById("bcontent");
    if(btitle.value.trim() == ""){ alert("빈칸입니다.\n제목을 입력해주세요."); btitle.focus(); return false; }
    if(bcontent.value.trim() == ""){ alert("빈칸입니다.\n내용을 입력해주세요."); bcontent.focus(); return false; }
    return true;
}
</script>
</th:block>
</body>
</html>
