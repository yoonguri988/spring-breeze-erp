<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>공지 삭제</title>
</head>

<body>
<th:block layout:fragment="content">

<script th:inline="javascript">
window.addEventListener("load", function () {
    let result = /*[[${result}]]*/ '';
    console.log(result);

    if(result == "공지글 삭제 실패"){
        alert(result);
        history.go(-1);
    }else if(result.length != 0){
        alert(result);
    }
});
</script>

<main class="sb-content">

    <div class="sb-page-head">
        <div class="sb-page-head__txt">
            <div class="sb-breadcrumb">
                <a th:href="@{/}">홈</a>
                <i class="bi bi-chevron-right"></i>
                업무
                <i class="bi bi-chevron-right"></i>
                공지 관리
                <i class="bi bi-chevron-right"></i>
                삭제
            </div>

            <h1>공지 삭제</h1>
            <p>게시글 삭제를 위해 사원번호를 확인합니다.</p>
        </div>
    </div>

    <div class="sb-card">
        <form th:action="@{/notice/delete}" method="get" onsubmit="return checkForm()">

            <div class="sb-card__body">

                <input type="hidden" name="bno" th:value="${param.bno}">

                <div class="mb-3">
                    <label class="sb-form-label">사원번호</label>
                    <input type="text"
                           class="form-control"
                           id="empId"
                           name="empId"
                           placeholder="사원번호를 입력하세요.">
                </div>

            </div>

            <div class="sb-card__footer d-flex justify-content-end gap-2">

                <button type="reset" class="btn btn-sb-soft">
                    취소
                </button>

                <a th:href="@{/notice/list}"
                   class="btn btn-outline-secondary">
                    목록
                </a>

                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i>
                    삭제
                </button>

            </div>

        </form>
    </div>

</main>

<script>
function checkForm() {

    const empId = document.getElementById("empId");

    if(empId.value.trim() === ""){
        alert("사원번호를 입력해주세요.");
        empId.focus();
        return false;
    }

    return confirm("정말 삭제하시겠습니까?");
}
</script>

</th:block>
</body>
</html>
