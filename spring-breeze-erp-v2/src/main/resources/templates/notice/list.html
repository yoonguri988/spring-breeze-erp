<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>공지 관리</title>
</head>
<body data-page="notices">
<th:block layout:fragment="content">
<script th:inline="javascript">
window.addEventListener("load", function(){
    let result = /*[[${result}]]*/ '';
    console.log(result);

    if(result=="공지 등록 실패" || result=="공지 삭제 실패"){ alert(result); history.go(-1); }
    else if (result.length!=0){ alert(result); }
});
</script>

<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb"><a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 업무 <i class="bi bi-chevron-right"></i> 공지 관리</div>
    <h1>공지 관리</h1>
    <p>전사 공지사항을 게시하고 카테고리별로 관리합니다.</p>
  </div>
<div class="sb-page-head__actions my-3">
  <a th:href="@{/notice/write}" class="btn btn-sb btn-sm" id="ntcNew">
    <i class="bi bi-megaphone"></i> 공지 작성
  </a>
</div>
</div>

<div class="sb-card mb-3">
  <div class="sb-toolbar">
    <strong style="font-size:14px">공지 목록</strong>
    <span class="sb-badge sb-badge--gray" th:text="|${totalCnt}건|">0건</span>
    <div class="grow"></div>

    <form id="searchForm" th:action="@{/notice/list}" method="get" class="sb-search-form">
      <div class="sb-field sb-field--search">
        <i class="bi bi-search"></i>
        <input type="text" name="keyword" placeholder="제목 검색" th:value="${search.keyword}">
      </div>
      <div class="sb-field">
        <select name="sortBy">
          <option value="new" th:selected="${search.sortBy == 'new' or search.sortBy == null}">최신순</option>
          <option value="views" th:selected="${search.sortBy == 'views'}">조회순</option>
        </select>
      </div>
      <button type="submit" class="btn btn-sb-soft btn-sm">조회</button>
    </form>
  </div>

  <div class="sb-card__body--flush">
    <div id="ntcList">
      <div class="sb-empty" th:if="${#lists.isEmpty(notices)}">
        <i class="bi bi-megaphone"></i><p>공지사항이 없습니다.</p>
      </div>

      <div class="ntc-row d-flex align-items-center px-3 py-3"
     style="border-bottom:1px solid var(--sb-border)"
     th:each="n : ${notices}">

        <div class="flex-grow-1 d-flex flex-column" style="min-width:0">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            <a th:href="@{/notice/detail(bno=${n.bno})}" class="text-decoration-none text-dark" th:text="${n.btitle}">제목</a>
          </div>
          <div class="text-faint" style="font-size:12px;margin-top:2px">
            작성자 [[${n.empName}]] · [[${#temporals.format(n.createdAt, 'yyyy-MM-dd')}]]
          </div>
        </div>

        <div class="text-faint d-flex align-items-center gap-1" style="font-size:12.5px;margin-left:8px">
          <i class="bi bi-eye"></i> [[${n.bhit}]]
        </div>

        <a th:href="@{/notice/detail(bno=${n.bno})}" class="text-decoration-none">
          <i class="bi bi-chevron-right text-faint ms-2"></i>
        </a>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center py-3" style="border-top:1px solid var(--sb-border)" th:if="${paging != null}">
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" th:if="${paging.start > paging.bottomlist}">
        <a th:href="@{/notice/list(pstartno=${paging.start-1}, keyword=${param.keyword}, sortBy=${param.sortBy})}" class="page-link">이전</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(paging.start, paging.end)}" th:classappend="${i==paging.current} ? 'active' : ''">
        <a th:href="@{/notice/list(pstartno=${i}, keyword=${param.keyword}, sortBy=${param.sortBy})}" class="page-link" th:text="${i}"></a>
      </li>
      <li class="page-item" th:if="${paging.pagetotal > paging.end}">
        <a th:href="@{/notice/list(pstartno=${paging.end+1}, keyword=${param.keyword}, sortBy=${param.sortBy})}" class="page-link">다음</a>
      </li>
    </ul>
  </div>
</div>
</main>

</th:block>
</body>
</html>
