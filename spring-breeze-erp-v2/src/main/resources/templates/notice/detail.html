<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>공지 상세</title>
</head>
<body>
<th:block layout:fragment="content">
<script th:inline="javascript">
window.addEventListener("load", function () {
    let result = /*[[${result}]]*/ '';
    console.log(result);

    if(result.length != 0){
        alert(result);
    }
});
</script>
<main class="sb-content">
    <div class="sb-page-head">
        <div class="sb-page-head__txt">
            <div class="sb-breadcrumb">
                <a th:href="@{/}">홈</a>
                <i class="bi bi-chevron-right"></i> 업무 <i class="bi bi-chevron-right"></i> 공지 관리 <i class="bi bi-chevron-right"></i>
                상세보기
            </div>
            <h1>공지 상세</h1> <p>공지사항 내용을 확인합니다.</p>
        </div>
    </div>
    
    <div class="sb-card">
        <div class="sb-card__body">
            <div class="mb-3">
                <label class="sb-form-label">제목</label>
                <input type="text" class="form-control" th:value="${notice.btitle}" readonly>
            </div>
            <div class="mb-3">
                <label class="sb-form-label">내용</label>
                <textarea class="form-control" rows="10" readonly th:text="${notice.bcontent}"></textarea>
            </div>

            <!--
              notice.bfile은 FileUploadUtil이 돌려주는 fileUrl(예: /upload/notice/attach/xxxx.pdf)이 그대로 저장된 값.
              이미 "/upload/..."로 시작하는 완성된 경로라서 @{${notice.bfile}} 로만 써야 하고,
              예전처럼 "/upload/" + bfile 식으로 또 이어붙이면 경로가 두 번 겹친다.
              첨부파일 종류도 이미지만 있는 게 아니라 pdf/office/hwp/zip도 올 수 있어서
              확장자를 보고 이미지면 <img>, 아니면 다운로드 링크로 분기한다.
            -->
            <div class="mb-3"
                 th:if="${notice.bfile != null and !#strings.isEmpty(notice.bfile)}"
                 th:with="attExt=${#strings.toLowerCase(#strings.substringAfter(notice.bfile,'.'))}">
                <label class="sb-form-label">첨부파일</label>

                <div class="mt-2">
                    <img th:if="${attExt == 'png' or attExt == 'jpg' or attExt == 'jpeg' or attExt == 'gif' or attExt == 'webp'}"
                         th:src="@{${notice.bfile}}" th:alt="${notice.btitle}"
                         class="img-fluid rounded" style="max-width:500px;">

                    <a th:unless="${attExt == 'png' or attExt == 'jpg' or attExt == 'jpeg' or attExt == 'gif' or attExt == 'webp'}"
                       th:href="@{${notice.bfile}}" class="btn btn-sb-soft" target="_blank" rel="noopener">
                        <i class="bi bi-download"></i>
                        첨부파일 다운로드 (<span th:text="${'.' + attExt}"></span>)
                    </a>
                </div>
            </div>
        </div>
        
        <div class="sb-card__footer d-flex justify-content-end gap-2 mb-3 pe-3">
            <a th:href="@{/notice/edit(bno=${notice.bno})}" class="btn btn-sb-soft">
                <i class="bi bi-pencil-square"></i>
                수정
            </a>

            <a th:href="@{/notice/delete(bno=${notice.bno})}" class="btn btn-outline-danger" onclick="return confirm('정말 삭제하시겠습니까?');">
                <i class="bi bi-trash"></i>
                삭제
            </a>

            <a th:href="@{/notice/list}" class="btn btn-sb"> 
            <i class="bi bi-list"></i>
                목록
            </a>
        </div>
        
    </div>
</main>
</th:block>
</body>
</html>
