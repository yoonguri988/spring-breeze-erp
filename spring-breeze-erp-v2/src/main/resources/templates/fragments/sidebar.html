<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head lang="ko"><title>sidebar fragment</title></head>
<body>
<!--
  [변경점]
  - <%@ taglib ... %> 지시어들은 모두 제거.
    Thymeleaf 는 별도 taglib 선언이 필요 없고, <html> 태그에 xmlns:sec 네임스페이스만
    선언해주면 sec: 관련 속성을 바로 사용할 수 있다. (thymeleaf-extras-springsecurity6 의존성 필요)
  - 전체 내용을 th:fragment="sidebar" 로 감싸서,
    메인 레이아웃에서 th:replace="~{fragments/sidebar :: sidebar}" 형태로 재사용.
-->
<th:block th:fragment="sidebar">

    <div class="sb-brand">
        <div class="sb-brand__mark">S</div>
        <div class="sb-brand__name">SB<b>erp</b></div>
    </div>

    <nav class="sb-nav" id="sbNav">
        <!-- [변경점] ${pageContext.request.contextPath}/xxx -> th:href="@{/xxx}" -->
        <a class="sb-nav__item" data-page="dashboard" data-tip="대시보드" th:href="@{/}">
            <i class="bi bi-grid-1x2-fill"></i><span class="sb-nav__label">대시보드</span>
        </a>

        <div class="sb-nav__section">조직 관리</div>
        <a class="sb-nav__item" data-page="company" data-tip="회사 • 부서 관리" th:href="@{/com/list}">
            <i class="bi bi-building"></i><span class="sb-nav__label">회사 • 부서 관리</span>
        </a>
        <a class="sb-nav__item" data-page="employees" data-tip="사원관리" th:href="@{/emp/list}">
            <i class="bi bi-people"></i><span class="sb-nav__label">사원관리</span>
        </a>
        <!-- <a class="sb-nav__item" data-page="permissions" data-tip="권한 관리" th:href="@{/auth/list}">
            <i class="bi bi-shield-lock"></i><span class="sb-nav__label">권한 관리</span>
        </a> -->

        <div class="sb-nav__section">업무</div>
        <a class="sb-nav__item" data-page="documents" data-tip="전자결재" th:href="@{/appr/list_form}">
            <i class="bi bi-file-earmark-text"></i><span class="sb-nav__label">전자문서 · 결재</span>
            <!-- <span class="sb-nav__badge">5</span> -->
        </a>
        <a class="sb-nav__item" data-page="projects" data-tip="프로젝트" th:href="@{/proj/proj_list}">
            <i class="bi bi-kanban"></i>
            <span class="sb-nav__label">프로젝트 및 태스크</span>
        </a>
        <a class="sb-nav__item" data-page="notices" data-tip="공지 관리" th:href="@{/notice/list}">
            <i class="bi bi-megaphone"></i>
            <span class="sb-nav__label">공지 관리</span>
        </a>

        <div class="sb-nav__section">자산</div>
        <a class="sb-nav__item" data-page="resources" data-tip="자원 관리" th:href="@{/res/list}">
            <i class="bi bi-collection"></i>
            <span class="sb-nav__label">자원 관리</span>
        </a>
        <a class="sb-nav__item" data-page="reservation" data-tip="예약 내역" th:href="@{/resv/list}">
            <i class="bi bi-calendar2-check"></i>
            <span class="sb-nav__label">예약 내역</span>
        </a>

        <!--
          [변경점]
          <sec:authorize access="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')"> ... </sec:authorize>
          -> sec:authorize 속성 하나로 대체 (SpEL 표현식은 그대로 사용 가능)
        -->
        <a class="sb-nav__item" data-page="approval" data-tip="예약 승인 관리" th:href="@{/admin/approval/list}"
           sec:authorize="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')">
            <i class="bi bi-clipboard-check"></i>
            <span class="sb-nav__label">예약 승인 관리</span>
        </a>
    </nav>
    <!--
      [변경점]
      원본은 <sec:authorize isAuthenticated()> 안에
      <sec:authentication var="empName"/> 를 별도로 선언해서 썼지만,
      Thymeleaf 에서는 sec:authorize(조건) + th:with(변수 추출)를 한 태그에서 같이 처리 가능.
    -->
    <div class="sb-sidebar__foot" sec:authorize="isAuthenticated()"
         th:with="empName=${#authentication.principal.user.empName},
                   posName=${#authentication.principal.user.posName}">
        <div class="sb-userchip" data-bs-toggle="dropdown">
            <div class="sb-avatar" th:text="${#strings.substring(empName, 0, 1)}">S</div>
            <div class="sb-userchip__meta">
                <b th:text="${empName}">사원명</b>
                <span th:text="${posName}">직급</span>
            </div>
            <i class="bi bi-chevron-expand ms-auto sb-nav__label" style="color:var(--sb-ink-faint);font-size:14px;"></i>
        </div>
    </div>
</th:block>
</body>
</html>
