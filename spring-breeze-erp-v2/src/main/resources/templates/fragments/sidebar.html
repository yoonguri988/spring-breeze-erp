<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head lang="ko">
<title>sidebar fragment</title>
</head>
<body>
	<th:block th:fragment="sidebar">

		<div class="sb-brand">
			<div class="sb-brand__mark">S</div>
			<div class="sb-brand__name">
				SB<b>erp</b>
			</div>
		</div>

		<th:block
			th:with="isRoot=${#authorization.expression('hasAuthority(''ROOT'')')}">
			<th:block
				th:with="isAdmin=${#authorization.expression('hasAuthority(''ROOT'') or hasRole(''ADMIN'')')}">

				<nav class="sb-nav" id="sbNav">
					<a class="sb-nav__item" data-page="dashboard" data-tip="대시보드"
						th:href="@{/}"> <i class="bi bi-grid-1x2-fill"></i><span
						class="sb-nav__label">대시보드</span>
					</a>

					<div class="sb-nav__section">조직 관리</div>

					<!-- 관리자 : 회사·부서 통합 관리 -->
					<a class="sb-nav__item" data-page="company" data-tip="회사 • 부서 관리"
						th:if="${isRoot}" th:href="@{/com/list}"> <i
						class="bi bi-building-gear"></i><span class="sb-nav__label">회사
							• 부서 관리</span>
					</a>

					<!-- 일반 사용자 : 내 회사 정보 -->
					<a class="sb-nav__item" data-page="company" data-tip="내 회사 정보"
						th:href="@{/com/my}"> <i class="bi bi-building"></i><span
						class="sb-nav__label">내 회사 정보</span>
					</a> <a class="sb-nav__item" data-page="company" data-tip="회사 내 부서 조회"
						th:href="@{/dept/list}"> <i class="bi bi-diagram-3"></i><span
						class="sb-nav__label">회사 내 부서 조회</span>
					</a>

					<!-- 일반 사용자 : 내 부서 정보 -->
					<a class="sb-nav__item" data-page="department" data-tip="내 부서 정보"
						th:href="@{/dept/detail}"> <i class="bi bi-tag"></i><span
						class="sb-nav__label">내 부서 정보</span>
					</a>

					<!-- 일반 사용자: 사원 관리 조회까지 -->
					<a class="sb-nav__item" data-page="employees" data-tip="사원 관리" th:href="@{/emp/list}">
						<i class="bi bi-people"></i><span
						class="sb-nav__label">사원 관리</span>
					</a>
					<!-- 관리자 : 직급/권한/인사 평가 관리 -->
					<a class="sb-nav__item" data-page="position" data-tip="직급 관리" th:if="${isAdmin}" th:href="@{/pos/list}">
						<i class="bi bi-briefcase"></i>
						<span class="sb-nav__label">직급관리</span>
					</a>
					<a class="sb-nav__item" data-page="permissions" data-tip="권한 관리" th:if="${isAdmin}" th:href="@{/perm/list}">
						<i class="bi bi-shield-lock"></i><span class="sb-nav__label">권한 관리</span>
					</a>
					<a class="sb-nav__item" data-page="evaluation" data-tip="인사 평가 관리" th:if="${isAdmin}" th:href="@{/eval/period/list}" >
						<i class="bi bi-clipboard-check"></i><span class="sb-nav__label">인사 평가</span>
					</a>


					<div class="sb-nav__section">업무</div>
					<a class="sb-nav__item" data-page="documents" data-tip="전자결재"
						th:href="@{/appr/list_form}"> <i
						class="bi bi-file-earmark-text"></i><span class="sb-nav__label">전자문서
							· 결재</span> <!-- <span class="sb-nav__badge">5</span> -->
					</a> <a class="sb-nav__item" data-page="projects" data-tip="프로젝트"
						th:href="@{/proj/proj_list}"> <i class="bi bi-kanban"></i> <span
						class="sb-nav__label">프로젝트 및 태스크</span>
					</a> <a class="sb-nav__item" data-page="notices" data-tip="공지 관리"
						th:href="@{/notice/list}"> <i class="bi bi-megaphone"></i> <span
						class="sb-nav__label">공지 관리</span>
					</a>

					<div class="sb-nav__section">자산</div>
					<a class="sb-nav__item" data-page="resources" data-tip="자원 관리"
						th:href="@{/res/list}"> <i class="bi bi-collection"></i> <span
						class="sb-nav__label">자원 관리</span>
					</a> <a class="sb-nav__item" data-page="reservation" data-tip="예약 내역"
						th:href="@{/resv/list}"> <i class="bi bi-calendar2-check"></i>
						<span class="sb-nav__label">예약 내역</span>
					</a>

					<!--
          [변경점]
          <sec:authorize access="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')"> ... </sec:authorize>
          -> sec:authorize 속성 하나로 대체 (SpEL 표현식은 그대로 사용 가능)
        -->
					<a class="sb-nav__item" data-page="approval" data-tip="예약 승인 관리"
						th:href="@{/admin/approval/list}"
						sec:authorize="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')">
						<i class="bi bi-clipboard-check"></i> <span class="sb-nav__label">예약
							승인 관리</span>
					</a>
				</nav>
				<!--
      [변경점]
      원본은 <sec:authorize isAuthenticated()> 안에
      <sec:authentication var="empName"/> 를 별도로 선언해서 썼지만,
      Thymeleaf 에서는 sec:authorize(조건) + th:with(변수 추출)를 한 태그에서 같이 처리 가능.
    -->
				<div class="sb-sidebar__foot" sec:authorize="isAuthenticated()"
					th:with="empName=${#authentication.principal.user.empName},
                   posName=${#authentication.principal.user.posName}">
					<div class="sb-userchip" data-bs-toggle="dropdown">
						<div class="sb-avatar"
							th:text="${#strings.substring(empName, 0, 1)}">S</div>
						<div class="sb-userchip__meta">
							<b th:text="${empName}">사원명</b> <span th:text="${posName}">직급</span>
						</div>
						<i class="bi bi-chevron-expand ms-auto sb-nav__label"
							style="color: var(- -sb-ink-faint); font-size: 14px;"></i>
					</div>
				</div>
			</th:block>
</body>
</html>
