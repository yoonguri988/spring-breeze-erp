<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
  <title>SPRING-BREEZE-ERP</title>
</head>
<body>
<!-- 	footer		 -->
	<th:block th:fragment="footer" >
      <footer class="sb-footer" id="sbFooter">
        <span>© 2026 SBerp 통합 ERP 시스템</span>
        <span class="d-none d-md-inline">v0.1.0</span>
        <a href="#" class="d-none d-md-inline">이용약관</a>
        <a href="#" class="d-none d-md-inline">개인정보처리방침</a>
        <span class="ms-auto d-inline-flex align-items-center gap-2">
          <span class="sb-dot" style="background:var(--sb-green);"></span>
          모든 시스템 정상
        </span>
      </footer>

      <!--
        [변경점 1]
        원본에서는 <script> 태그들이 </body> 태그 바깥, <html> 태그 안쪽에 위치해서
        HTML 구조상 잘못된 위치였음 (스크립트가 body 밖에 떠 있던 상태).
        -> footer fragment 안, </footer> 바로 뒤 (body 안)으로 이동.

        [변경점 2]
        src="@{/js/app.js}" 처럼 일반 HTML 속성(src)에 th: 접두사 없이
        @{...} 표현식을 그대로 쓰면 Thymeleaf 엔진이 이를 해석하지 못하고
        문자열 "@{/js/app.js}" 가 그대로 브라우저에 출력되는 버그였음(스크립트 로드 실패).
        -> th:src="@{...}" 로 수정해서 Thymeleaf가 URL을 정상적으로 렌더링하도록 변경.
      -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      <script th:src="@{/js/app.js}"></script>
      <script th:src="@{/js/layout.js}"></script>
	</th:block>
<!-- 	footer		 -->
</body>
</html>
