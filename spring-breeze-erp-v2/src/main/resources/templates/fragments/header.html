<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head lang="ko">
    <title>SPRING-BREEZE-ERP</title>
    <!--
      [변경점]
      JSP 시절에는 <link> CSS 목록이 header.jsp 최상단(head)에 그대로 박혀 있었음.
      Thymeleaf 에서는 이 부분만 별도 fragment(headResources)로 분리해서
      메인 레이아웃(layout.html)의 <head> 안에서
        th:replace="~{fragments/header :: headResources}"
      로 끌어다 쓰는 구조로 바꿈. (head 는 fragment 로 재사용해도 무방)
    -->
    <th:block th:fragment="headResources">
        <!-- Latest compiled and minified CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- bootstrap5 icon 추가 -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

        <!--
          [변경점] JSP EL ${pageContext.request.contextPath}/css/xxx.css
                 -> Thymeleaf 표준 표현식 @{...} 로 대체.
          @{...} 는 서버 설정에 따라 context-path 를 자동으로 붙여준다.
        -->
        <link rel="stylesheet" th:href="@{/css/app.css}"/>
        <!-- KJY -->
        <link rel="stylesheet" th:href="@{/css/appr.css}"/>
        <!-- KJY -->
        <link rel="stylesheet" th:href="@{/css/company.css}"/>
        <link rel="stylesheet" th:href="@{/css/dept.css}"/>
        <link rel="stylesheet" th:href="@{/css/emp.css}"/>
        <link rel="stylesheet" th:href="@{/css/my.css}"/>
        <link rel="stylesheet" th:href="@{/css/perm.css}"/>
        <link rel="stylesheet" th:href="@{/css/project.css}"/>
    </th:block>
</head>
<body>

<!--
  [변경점 - 구조]
  기존 header.jsp 는
    <div class="sb-app"> <aside>...sidebar include...</aside> <div class="sb-main"> <header>...
  형태로 sidebar 와 전체 레이아웃 div 까지 한 파일 안에서 열고,
  footer.jsp 에서 나머지를 닫는 "위/아래로 쪼개진" 구조였음.

  Thymeleaf-layout-dialect 를 쓰는 방식에서는
  전체 골격(div.sb-app, aside, div.sb-main)은 메인 레이아웃 파일(layout.html)이 담당하고,
  header.html 은 <header> 태그 내부만 책임지도록 역할을 분리했다.
  (sidebar 내용물은 sidebar.html 에서 별도 fragment 로 관리)
-->
<th:block th:fragment="header">
    <header class="sb-header" id="sbHeader">
        <button class="sb-iconbtn" id="sbToggleSidebar" title="사이드바 접기/펼치기">
            <i class="bi bi-list"></i>
        </button>
        <div class="sb-header__brand">
            <div class="sb-brand__mark" style="width:26px;height:26px;font-size:13px;">S</div>
            <div class="sb-brand__name" style="font-size:16px;">SB<b>erp</b></div>
        </div>
        <div class="sb-header__spacer"></div>
        <div class="sb-header__right">
            <!-- Notifications -->
            <!--
              [변경점]
              <sec:authorize access="isAuthenticated()"> (JSP 커스텀 태그, spring-security-taglibs)
              -> sec:authorize="isAuthenticated()" (Thymeleaf 속성, thymeleaf-extras-springsecurity6)
              사용법은 access 표현식 그대로 재사용 가능 (SpEL 문법 동일)
            -->
            <div sec:authorize="isAuthenticated()">
                <!--
                  [변경점]
                  <sec:authentication property="principal.dto.empName" var="empName"/>
                  -> Thymeleaf 는 #authentication 내장(SpEL) 객체로 로그인 사용자 정보에 접근한다.
                  th:with 로 필요한 값들을 변수에 담아두고 아래에서 재사용.
                -->
                <div class="dropdown"
                     th:with="empName=${#authentication.principal.dto.empName},
                               empEmail=${#authentication.principal.dto.empEmail}">
                    <button class="sb-iconbtn" data-bs-toggle="dropdown" style="width:auto;padding:0 4px;" aria-expanded="false">
                        <!-- [변경점] JSTL fn:substring(empName, 0, 1) -> Thymeleaf #strings.substring(...) -->
                        <span class="sb-avatar" style="width:32px;height:32px;"
                              th:text="${#strings.substring(empName, 0, 1)}">S</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" style="min-width:200px;">
                        <li class="px-3 py-2 border-bottom">
                            <!-- [변경점] <c:out value="${empName}"/> -> th:text (자동으로 XSS 이스케이프 처리됨) -->
                            <b style="font-size:13.5px;" th:text="${empName}">사원명</b><br/>
                            <span class="text-faint" style="font-size:12px;" th:text="${empEmail}">email@sberp.com</span>
                        </li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>내 프로필</a></li>
                        <!-- [변경점] <sec:authorize access="hasRole('ROLE_ADMIN')"> -> sec:authorize 속성 -->
                        <li sec:authorize="hasRole('ROLE_ADMIN')">
                            <!-- 참고: 원본은 permissions.html 정적 링크였음. 실제 라우팅 경로에 맞춰 th:href 로 교체 -->
                            <a class="dropdown-item" th:href="@{/permissions}"><i class="bi bi-shield-lock me-2"></i>권한 설정</a>
                        </li>

                        <li>
                            <!--
                              [변경점]
                              - action="${pageContext.request.contextPath}/auth/logout" -> th:action="@{/auth/logout}"
                              - CSRF hidden input(${_csrf.parameterName}/${_csrf.token})은
                                Spring Security + Thymeleaf 연동 시(spring-boot-starter-security 가 클래스패스에 있으면)
                                th:action 을 쓴 <form> 태그에 CSRF 토큰이 자동으로 삽입된다.
                                (자동 삽입이 안 될 경우에만 아래 주석 라인을 직접 추가)
                              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            -->
                            <form th:action="@{/auth/logout}" method="post">
                                <input type="submit" value="로그아웃" class="dropdown-item text-danger"/>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
</th:block>
</body>
</html>
