<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{fragments/layout}">
<head>
<title>권한 등록</title>
</head>
<body>

	<!-- 접근 불가 -->
	<section
		sec:authorize="!hasAuthority('ROOT') and !hasRole('ROLE_ADMIN')"
		class="sb-content" layout:fragment="content">
		<div class="denied-card">
			<div class="denied-ico">
				<i class="bi bi-shield-x"></i>
			</div>
			<div class="denied-title">접근 권한이 없습니다</div>
			<div class="denied-body">
				권한 등록은 <strong>ROOT</strong> 및 <strong>ROLE_ADMIN</strong> 계정만
				가능합니다.
			</div>
			<a class="btn btn-ghost btn-sm" th:href="@{/}">홈으로</a>
		</div>
	</section>

	<!-- 메인 -->
	<section sec:authorize="hasAuthority('ROOT') or hasRole('ROLE_ADMIN')"
		class="sb-content" layout:fragment="content">

		<div class="sb-page-head">
			<div class="sb-page-head__txt">
				<div class="sb-breadcrumb">
					<a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> <a
						th:href="@{/perm/list}">권한 관리</a> <i class="bi bi-chevron-right"></i>
					권한 등록
				</div>
				<h1>권한 등록</h1>
				<p>회사에 새로운 권한을 등록합니다.</p>
			</div>
			<div class="sb-page-head__actions">
				<a th:href="@{/perm/list}" class="btn btn-ghost btn-sm"> <i
					class="bi bi-arrow-left"></i> 목록으로
				</a>
			</div>
		</div>

		<div class="sb-card mb-3">
			<div class="sb-card__head">
				<h2>
					<i class="bi bi-shield-lock me-2 text-soft"></i> 권한 정보
				</h2>
			</div>
			<div class="sb-card__body">

				<form th:action="@{/perm/add}" method="post"
					onsubmit="return checkForm()">

					<div class="mb-3">
						<label for="autName" class="sb-form-label">권한명 <span>*</span></label>
						<input type="text" class="form-control" id="autName"
							name="autName" placeholder="예: ROLE_MEMBER" required /> <small
							class="text-faint"> Spring Security 관례에 따라 <b>ROLE_</b>
							접두사로 시작하는 것을 권장합니다.
						</small>
					</div>

					<div class="sb-form-actions">
						<a th:href="@{/perm/list}" class="btn btn-ghost">취소</a>
						<button type="submit" class="btn btn-sb">
							<i class="bi bi-check-lg"></i> 등록
						</button>
					</div>
				</form>
			</div>
		</div>
	</section>

	<th:block layout:fragment="script">
		<script>
    function checkForm() {
        const autName = document.getElementById('autName').value.trim();
        if (autName === '') {
            alert('권한명을 입력하세요.');
            return false;
        }
        return true;
    }
</script>
	</th:block>

</body>
</html>
