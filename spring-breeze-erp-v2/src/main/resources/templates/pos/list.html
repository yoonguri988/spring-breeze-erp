<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{fragments/layout}">
<head>
<title>직급 관리</title>
</head>
<body>
	<section class="pos_list sb-content" layout:fragment="content">

		<!-- 페이지 헤더 -->
		<div class="sb-page-head">
			<div class="sb-page-head__txt">
				<div class="sb-breadcrumb">
					<a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 조직 관리 <i
						class="bi bi-chevron-right"></i> 직급 관리
				</div>
				<h1>직급 관리</h1>
				<p>회사별 직급을 등록·수정·삭제합니다. 직급은 사원 등록·수정 시 선택 항목으로 사용됩니다.</p>
			</div>
			<div class="sb-page-head__actions">
				<a class="btn btn-sb btn-sm" th:href="@{/pos/add}"> <i
					class="bi bi-plus-lg"></i> 직급 등록
				</a>
			</div>
		</div>

		<!-- 삭제 실패 메시지 -->
		<div th:if="${errorMsg != null}"
			class="sb-alert sb-alert--danger mb-3">
			<i class="bi bi-exclamation-circle me-2"></i> <span
				th:text="${errorMsg}">메시지</span>
		</div>

		<!-- 목록 카드 -->
		<div class="sb-card">

			<!-- 빈 상태 -->
			<div th:if="${#lists.isEmpty(posList)}" class="sb-empty"
				style="padding: 60px 20px">
				<i class="bi bi-diagram-3"></i>
				<p>
					등록된 직급이 없습니다.<br>'직급 등록' 버튼으로 새 직급을 만드세요.
				</p>
			</div>

			<!-- 목록 -->
			<div th:unless="${#lists.isEmpty(posList)}"
				class="sb-card__body--flush">
				<table class="sb-table">
					<thead>
						<tr>
							<th style="width: 80px">순서</th>
							<th style="width: 180px">코드</th>
							<th>직급명</th>
							<th style="width: 180px" class="num"></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="pos : ${posList}">
							<td class="tnum" th:text="${pos.posOrder}">1</td>
							<td><span class="sb-badge sb-badge--gray"
								th:text="${pos.posCode}">MGR</span></td>
							<td><span class="sb-table__name" th:text="${pos.posName}">부장</span>
							</td>
							<td class="num">
								<div class="d-flex justify-content-end gap-1">
									<a th:href="@{/pos/edit(posId=${pos.posId})}"
										class="sb-iconbtn"
										style="width: 30px; height: 30px; font-size: 14px" title="수정">
										<i class="bi bi-pencil"></i>
									</a>
									<form th:action="@{/pos/delete}" method="post"
										style="display: inline"
										onsubmit="return confirm('이 직급을 삭제하시겠습니까?\n이 직급을 사용중인 사원이 있으면 삭제할 수 없습니다.');">
										<input type="hidden" name="posId" th:value="${pos.posId}" />
										<button type="submit" class="sb-iconbtn"
											style="width: 30px; height: 30px; font-size: 14px; border: none; background: transparent"
											title="삭제">
											<i class="bi bi-trash3"></i>
										</button>
									</form>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<!-- 안내 -->
		<div class="mt-3 text-faint" style="font-size: 13px">
			<i class="bi bi-info-circle me-1"></i>
			직급 삭제는 해당 직급을 사용중인 사원이 없을 때만 가능합니다. 먼저 사원의 직급을 다른 직급으로 변경한 후 삭제하세요.
		</div>

	</section>
</body>
</html>
