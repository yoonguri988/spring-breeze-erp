<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${resource.resName} + ' · 자원 수정'">자원 수정</title>
</head>
<body>
<main layout:fragment="content" class="sb-content">
<!-- [추가 · insert.html과 통일] 서버 오류 메시지 토스트 -->
<div th:if="${not #strings.isEmpty(errorMsg)}" class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
    <div class="toast align-items-center text-bg-danger border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${errorMsg}"></span></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="sb-page-head">
    <div class="sb-page-head__txt">
        <div class="sb-breadcrumb">
            <a th:href="@{/res/list}">자원 관리</a>
            <i class="bi bi-chevron-right"></i> 자원 수정
        </div>
        <h1>자원 수정</h1>
        <p>등록된 자원 정보를 수정합니다.</p>
    </div>
    <div class="sb-page-head__actions">
        <a th:href="@{/res/list}" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left"></i> 목록으로</a>
    </div>
</div>

<form id="resForm" novalidate th:action="@{/res/update}" method="post">
    <input type="hidden" name="resId" th:value="${resource.resId}"/>

    <div class="sb-card mb-3">
        <div class="sb-card__head">
            <h2>기본 정보</h2>
            <span class="sub" th:text="${resource.resCode}"></span>
        </div>
        <div class="sb-card__body">
            <div class="row g-3">
                <!-- 1그룹: 자원코드 / 자원명 / 자원유형 (insert.html과 동일 배치, 자원ID만큼 폭 조정) -->
                <div class="col-md-3">
                    <label for="resCode" class="sb-form-label">자원코드 <span style="color:var(--sb-red)">*</span></label>
                    <input type="text" name="resCode" id="resCode" class="form-control"
                           th:value="${resource.resCode}" maxlength="50"
                           onblur="sbCheckResCode()" readonly>
                    <div class="invalid-feedback" id="eResCode">자원코드를 입력하세요.</div>
                </div>
                <div class="col-md-6">
                    <label for="resName" class="sb-form-label">자원명 <span style="color:var(--sb-red)">*</span></label>
                    <input type="text" name="resName" id="resName" class="form-control"
                           th:value="${resource.resName}" maxlength="100" readonly>
                    <div class="invalid-feedback" id="eResName">자원명을 입력하세요.</div>
                </div>
                <div class="col-md-3">
                    <label for="resType" class="sb-form-label">자원 유형</label>
                    <select name="resType" id="resType" class="form-select" onchange="sbCheckCapacity()" disabled>
                        <option value="ROOM" th:selected="${resource.resType == 'ROOM'}">회의실</option>
                        <option value="EQUIPMENT" th:selected="${resource.resType == 'EQUIPMENT'}">장비</option>
                        <option value="VEHICLE" th:selected="${resource.resType == 'VEHICLE'}">차량</option>
                    </select>
                </div>

                <!-- 2그룹: 위치 / 수량 / 수용인원 / 상태 -->
                <div class="col-md-4">
                    <label for="location" class="sb-form-label">위치</label>
                    <input type="text" name="location" id="location" class="form-control"
                           th:value="${resource.location}" maxlength="200">
                </div>
                <div class="col-md-2">
                    <label for="quantity" class="sb-form-label">수량</label>
                    <input type="number" name="quantity" id="quantity" class="form-control"
                           th:value="${resource.quantity}" min="0" required>
                </div>
                <div class="col-md-3">
                    <label for="capacity" class="sb-form-label">수용인원</label>
                    <input type="number" name="capacity" id="capacity" class="form-control"
                           th:value="${resource.capacity}" min="1" placeholder="회의실인 경우 입력" onblur="sbCheckCapacity()">
                    <div class="text-faint mt-1" style="font-size:12px" id="capacityHint">장비·차량은 비워두셔도 됩니다.</div>
                    <div class="invalid-feedback" id="eCapacity">회의실은 수용인원을 입력해야 합니다.</div>
                </div>
                <div class="col-md-3">
                    <label for="resStatus" class="sb-form-label">상태</label>
                    <select name="resStatus" id="resStatus" class="form-select">
                        <option value="AVAILABLE" th:selected="${resource.resStatus == 'AVAILABLE'}">사용가능</option>
                        <option value="MAINTENANCE" th:selected="${resource.resStatus == 'MAINTENANCE'}">점검중</option>
                        <option value="DISABLED" th:selected="${resource.resStatus == 'DISABLED'}">사용중지</option>
                    </select>
                </div>

                <!-- 3그룹: 비고 -->
                <div class="col-12">
                    <label for="remark" class="sb-form-label">비고</label>
                    <input type="text" name="remark" id="remark" class="form-control" th:value="${resource.remark}">
                </div>

                <!-- 4그룹: 담당자 -->
                <div class="col-12">
                    <label for="managerEmpId" class="sb-form-label">담당자</label>
                    <select name="managerEmpId" id="managerEmpId" class="form-select">
                        <option value="">지정 안 함</option>
                        <option th:each="emp : ${empList}"
                                th:value="${emp.empId}"
                                th:selected="${resource.managerEmpId != null and emp.empId == resource.managerEmpId}"
                                th:text="${emp.empName} + ' (' + ${emp.posName} + ')'"></option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-end">
        <a th:href="@{/res/list}" class="btn btn-ghost">취소</a>
        <button type="submit" class="btn btn-sb">
            <i class="bi bi-check-lg"></i> 수정 완료
        </button>
    </div>
</form>

<script th:inline="javascript">
(function () {
  "use strict";

  var ORIG_CODE = "";
  var RES_ID    = "";

  /* [insert.html과 동일] 자원유형이 회의실(ROOM)일 때만 수용인원 필수 */
  window.sbCheckCapacity = function () {
    var typeEl = document.getElementById("resType");
    var capEl  = document.getElementById("capacity");
    var isRoom = typeEl.value === "ROOM";

    if (isRoom && !capEl.value.trim()) {
      capEl.classList.add("is-invalid");
      return false;
    }
    capEl.classList.remove("is-invalid");
    return true;
  };

  /* ── 제출 검증 (insert.html과 동일한 방식) ── */
  document.getElementById("resForm").addEventListener("submit", function (e) {
    var valid = true;

    var codeEl = document.getElementById("resCode");
    if (!codeEl.value.trim()) {
      codeEl.classList.add("is-invalid");
      document.getElementById("eResCode").textContent = "자원코드를 입력하세요.";
      valid = false;
    } else if (codeEl.classList.contains("is-invalid")) {
      valid = false; // 중복체크에서 이미 invalid로 표시된 경우
    }

    var nameEl = document.getElementById("resName");
    nameEl.classList.remove("is-invalid");
    if (!nameEl.value.trim()) {
      nameEl.classList.add("is-invalid");
      valid = false;
    }

    if (!sbCheckCapacity()) {
      valid = false;
    }

    if (!valid) e.preventDefault();
  });

  /* [추가] 페이지 로드시 기존 값 기준으로 한 번 체크해서, 회의실인데 수용인원이 비어있는
     기존 데이터가 있다면 진입하자마자 바로 표시해줌 */
  sbCheckCapacity();
})();
</script>
</main>
</body>
</html>
