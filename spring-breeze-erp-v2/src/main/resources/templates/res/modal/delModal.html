<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>resDeleteModal fragment</title></head>
<body>
<th:block th:fragment="deleteModal">

<!-- CSRF 등 삭제 POST에 필요한 값들을 페이지 로드시 한 번만 정적으로 심어둠 -->
<input type="hidden" id="resCsrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

<div class="modal fade" id="resDelModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:380px">
        <div class="modal-content">
            <div class="modal-header" style="border-bottom:none">
                <span class="fw-semibold" id="resDelHeaderLabel" style="color:var(--sb-red)">
                    <i class="bi bi-shield-exclamation me-1"></i>자원 삭제
                </span>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-0">
                <div class="del-modal-icon" id="resDelIconBox"><i class="bi bi-box-seam"></i></div>
                <div class="del-dept-name" id="resDelName"></div>
                <div class="del-warning" id="resDelMainWarning">계속하려면 <b>비밀번호</b>를 입력하세요.</div>

                <!-- 예약이 있어서 삭제 불가할 때만 보이는 경고 박스 -->
                <div class="del-warn-box" id="resDelReservationWarn" style="display:none">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="resDelReservationWarnText"></span>
                </div>

                <!-- 정상적으로 삭제 가능할 때만 쓰이는 비밀번호 입력 영역 -->
                <div class="mb-2" id="resDelPwGroup">
                    <label class="sb-form-label" for="empPass">비밀번호 <span style="color:var(--sb-red)">*</span></label>
                    <input type="password" class="form-control" id="empPass" placeholder="비밀번호 입력" autocomplete="new-password">
                    <div id="delPwErr" style="display:none;color:var(--sb-red);font-size:12.5px;margin-top:6px">
                        <i class="bi bi-exclamation-circle-fill me-1"></i><span id="delPwErrMsg">비밀번호가 올바르지 않습니다.</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer" id="resDelFooter" style="border-top:none">
                <button class="btn btn-ghost" id="resDelCancelBtn" data-bs-dismiss="modal">취소</button>
                <button class="btn btn-sb" id="resDelYes" style="background:var(--sb-red);border-color:var(--sb-red)">
                    <i class="bi bi-trash3" id="resDelYesIcon"></i>
                    <span id="resDelYesLabel">삭제 확인</span>
                </button>
            </div>
        </div>
    </div>
</div>
</th:block>
</body>
</html>
