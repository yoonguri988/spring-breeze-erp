<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{fragments/layout}">
<head>
<title>내 평가 리포트</title>
</head>
<body>
	<section class="eval_report_my sb-content" layout:fragment="content">

		<div class="sb-page-head">
			<div class="sb-page-head__txt">
				<div class="sb-breadcrumb">
					<a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 내 평가
					리포트
				</div>
				<h1>내 평가 리포트</h1>
				<p>회차별로 발행된 나의 AI 평가 리포트를 확인합니다.</p>
			</div>
		</div>

		<div th:if="${successMsg}" class="sb-alert sb-alert--success mb-3">
			<i class="bi bi-check-circle me-2"></i> <span th:text="${successMsg}">메시지</span>
		</div>
		<div th:if="${errorMsg}" class="sb-alert sb-alert--danger mb-3">
			<i class="bi bi-exclamation-circle me-2"></i> <span
				th:text="${errorMsg}">메시지</span>
		</div>

		<div th:if="${#lists.isEmpty(reports)}" class="sb-card">
			<div class="sb-empty" style="padding: 60px 20px">
				<i class="bi bi-file-earmark-bar-graph"></i>
				<p>
					아직 발행된 리포트가 없습니다.<br> <span class="text-faint"
						style="font-size: 13px">회차가 마감되고 관리자가 리포트를 생성하면 이곳에서 확인할 수
						있습니다.</span>
				</p>
			</div>
		</div>

		<div th:unless="${#lists.isEmpty(reports)}" class="row g-3">
			<div th:each="r : ${reports}" class="col-md-6 col-lg-4">
				<a th:href="@{/eval/report/detail(reportId=${r.reportId})}"
					class="sb-card sb-card--link h-100"
					style="text-decoration: none; color: inherit">
					<div class="sb-card__body">
						<div class="d-flex justify-content-between align-items-start mb-3">
							<div>
								<div class="text-faint" style="font-size: 12px"
									th:text="|${r.periodYear} · ${r.periodTerm}|">2025 · H1</div>
								<div style="font-size: 15px; font-weight: 650; margin-top: 2px"
									th:text="${r.periodTitle}">회차 제목</div>
							</div>
							<div class="text-center">
								<div th:text="${r.grade}"
									style="font-size: 20px; font-weight: 800; padding: 4px 10px; border-radius: 6px; background: var(- -sb-bg-2)">S</div>
							</div>
						</div>

						<div class="d-flex justify-content-between align-items-center"
							style="padding: 10px; background: var(- -sb-bg-2); border-radius: 6px">
							<div>
								<div class="text-faint" style="font-size: 11px">종합 점수</div>
								<div style="font-size: 16px; font-weight: 700"
									th:text="${r.overallScore} + ' / 5.00'">4.20 / 5.00</div>
							</div>
							<span class="sb-badge"
								th:classappend="${r.sentimentLabel == 'POSITIVE'} ? 'sb-badge--accent'
                                            : (${r.sentimentLabel == 'NEGATIVE'} ? 'sb-badge--danger' : 'sb-badge--muted')"
								th:text="${r.sentimentLabel}">POSITIVE</span>
						</div>

						<div class="text-faint mt-3" style="font-size: 11px">
							<i class="bi bi-clock me-1"></i> <span th:text="${r.generatedAt}">2025-01-01
								12:00</span>
						</div>
					</div>
				</a>
			</div>
		</div>

	</section>
</body>
</html>
