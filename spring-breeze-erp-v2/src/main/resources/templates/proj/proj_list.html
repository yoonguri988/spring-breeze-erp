<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>프로젝트 목록</title>
</head>
<body>
<th:block layout:fragment="content">
<script th:inline="javascript">
window.addEventListener("load",function(){
	let result = /*[[${result}]]*/ '';
	console.log(result);

	if(result=="프로젝트 등록 실패"||result=="프로젝트 삭제 실패"){alert(result); history.go(-1);}
	else if (result.length!=0){alert(result);}
});
</script>

<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb"><a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 업무 <i class="bi bi-chevron-right"></i> 프로젝트</div>
    <h1>프로젝트 목록</h1>
    <p>전체 프로젝트 현황을 조회하고 관리합니다.</p>
  </div>
  <div class="sb-page-head__actions my-3">
    <a th:href="@{/proj/proj_create}" class="btn btn-sb btn-sm"><i class="bi bi-folder-plus"></i> 프로젝트 생성</a>
  </div>
</div>

<div class="sb-card mb-3">
  <div class="sb-toolbar">
  <form id="searchForm" th:action="@{/proj/proj_list}" method="get" class="sb-search-form">
 	<input type="hidden" name="searched" value="true">
    <div class="sb-field sb-field--search">
      <i class="bi bi-search"></i>
      <input type="text" name="keyword" placeholder="프로젝트명 검색" th:value="${search.keyword}">
    </div>

    <input type="hidden" name="proStatus" id="proStatus" th:value="${search.proStatus}">

    <div class="sb-segment">
     <a href="#" onclick="setStatus(''); return false;" th:classappend="${search.proStatus == null or #strings.isEmpty(search.proStatus)} ? 'active' : ''">전체</a>
	 <a href="#" onclick="setStatus('TODO'); return false;" th:classappend="${search.proStatus=='TODO'} ? 'active' : ''">· TODO</a>
	 <a href="#" onclick="setStatus('DOING'); return false;" th:classappend="${search.proStatus=='DOING'} ? 'active' : ''">· DOING</a>
   	 <a href="#" onclick="setStatus('DONE'); return false;" th:classappend="${search.proStatus=='DONE'} ? 'active' : ''">· DONE</a>
    </div>

    <div class="grow"></div>

    <div class="sb-field sb-field--date">
      <i class="bi bi-calendar3"></i>
      <input type="date" name="startDate" th:value="${param.startDate}">
    </div>
    <span class="text-faint">~</span>
    <div class="sb-field">
      <input type="date" name="endDate" th:value="${param.endDate}">
    </div>

    <button type="submit" class="btn btn-sb-soft btn-sm">조회</button>
  </form>
  </div>

  <div class="sb-card__body--flush">
    <table class="sb-table">
      <thead>
        <tr>
          <th>프로젝트명</th>
          <th>설명</th>
          <th>생성자</th>
          <th>참여인원</th>
          <th>기간</th>
          <th>등록일</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="dto : ${list}">
            <td><a th:href="@{/proj/proj_detail(pro_id=${dto.proId})}" class="sb-table__name" th:text="${dto.proName}"></a></td>
            <td class="sb-table__muted" th:text="${dto.proDesc}"></td>
            <td th:text="${dto.empName}"></td>
            <td>
              <a th:href="@{/proj/proj_member(pro_id=${dto.proId})}" class="sb-iconbtn" style="width:28px;height:28px;font-size:14px;display:inline-grid;"><i class="bi bi-people"></i></a>
              [[${dto.memberCnt}]]명
            </td>
            <td class="sb-hr-cell tnum" th:text="${#temporals.format(dto.startDate, 'yyyy-MM-dd')} + ' ~ ' + ${#temporals.format(dto.endDate, 'yyyy-MM-dd')}"></td>
            <td class="sb-hr-cell tnum" th:text="${#temporals.format(dto.createdAt, 'yyyy-MM-dd')}"></td>
        </tr>
      </tbody>
    </table>
    <div class="sb-empty" th:if="${#lists.isEmpty(list)}"><i class="bi bi-folder2-open"></i><p>조회된 프로젝트가 없습니다.</p></div>
  </div>
<div class="d-flex justify-content-center py-3" style="border-top:1px solid var(--sb-border)" th:if="${paging != null}">
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" th:if="${paging.start > paging.bottomlist}">
        <a th:href="@{/proj/proj_list(pstartno=${paging.start-1}, keyword=${param.keyword}, proStatus=${param.proStatus}, startDate=${param.startDate}, endDate=${param.endDate}, searched=true)}" class="page-link">이전</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(paging.start, paging.end)}" th:classappend="${i==paging.current} ? 'active' : ''">
        <a th:href="@{/proj/proj_list(pstartno=${i}, keyword=${param.keyword}, proStatus=${param.proStatus}, startDate=${param.startDate}, endDate=${param.endDate}, searched=true)}" class="page-link" th:text="${i}"></a>
      </li>
      <li class="page-item" th:if="${paging.pagetotal > paging.end}">
        <a th:href="@{/proj/proj_list(pstartno=${paging.end+1}, keyword=${param.keyword}, proStatus=${param.proStatus}, startDate=${param.startDate}, endDate=${param.endDate}, searched=true)}" class="page-link">다음</a>
      </li>
    </ul>
  </div>
</div>
</main>
<script th:inline="javascript">
function setStatus(status) {
  document.getElementById('proStatus').value = status;
  document.getElementById('searchForm').submit();
}
</script>
</th:block>
</body>
</html>
