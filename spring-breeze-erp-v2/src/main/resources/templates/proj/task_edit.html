<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>태스크 수정</title>
</head>
<body>
<th:block layout:fragment="content">
<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb"><a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 업무 <i class="bi bi-chevron-right"></i> 프로젝트 <i class="bi bi-chevron-right"></i> 태스크 수정</div>
    <h1>태스크 수정</h1>
  </div>
</div>

<div class="sb-card">
  <div class="sb-card__body">
    <form th:action="@{/proj/task_edit}" method="post" onsubmit="return check()">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" name="taskId" th:value="${dto.taskId}">

      <div class="mb-3">
        <label for="task_name" class="sb-form-label">태스크명</label>
        <input type="text" id="task_name" name="taskName" class="form-control" th:value="${dto.taskName}"/>
      </div>

      <div class="mb-3">
        <label for="task_desc" class="sb-form-label">태스크 설명</label>
        <textarea id="task_desc" name="taskDesc" class="form-control" rows="4" th:text="${dto.taskDesc}"></textarea>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label for="task_status" class="sb-form-label">상태</label>
          <select id="task_status" name="taskStatus" class="form-select">
            <option value="" disabled>상태를 선택하세요</option>
            <option value="TODO" th:selected="${dto.taskStatus=='TODO'}">TODO</option>
            <option value="DOING" th:selected="${dto.taskStatus=='DOING'}">DOING</option>
            <option value="DONE" th:selected="${dto.taskStatus=='DONE'}">DONE</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="pm_id_name" class="sb-form-label">담당자</label>
          <select id="pm_id_name" name="pmId" class="form-select">
            <option th:each="m : ${memberlist}" th:value="${m.pmId}" th:selected="${m.pmId == dto.pmId}" th:text="${m.empName}"></option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="reg_date" class="sb-form-label">수정일</label>
          <input type="text" id="reg_date" class="form-control"
                 th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}"
                 readonly style="background:#fafbfc;"/>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label for="task_start_date" class="sb-form-label">시작일</label>
          <input type="date" id="task_start_date" name="taskStartDate" class="form-control" th:value="${#dates.format(dto.taskStartDate, 'yyyy-MM-dd')}"/>
        </div>
        <div class="col-md-6">
          <label for="task_end_date" class="sb-form-label">종료일</label>
          <input type="date" id="task_end_date" name="taskEndDate" class="form-control" th:value="${#dates.format(dto.taskEndDate, 'yyyy-MM-dd')}"/>
        </div>
      </div>

      <div class="sb-divider"></div>

      <div class="d-flex justify-content-end gap-2">
        <button type="reset" class="btn btn-ghost" title="글수정취소">취소</button>
        <a th:href="@{/proj/proj_list}" class="btn btn-ghost" title="목록보러가기">목록</a>
        <button type="submit" class="btn btn-sb" title="수정">수정</button>
      </div>
    </form>
  </div>
</div>
</main>
<script>
function check(){
	 let taskName = document.getElementById("task_name");
	 let taskDesc = document.getElementById("task_desc");
	 let taskStatus = document.getElementById("task_status");
	 let pmId = document.getElementById("pm_id_name");
	 let taskStartDate = document.getElementById("task_start_date");
	 let taskEndDate = document.getElementById("task_end_date");

	 if(taskName.value.trim()==""){taskName.focus(); return false;}
	 if(taskDesc.value.trim()==""){taskDesc.focus(); return false;}
	 if(taskStatus.value.trim()==""){taskStatus.focus(); return false;}
	 if(pmId.value.trim()==""){pmId.focus(); return false;}
	 if(taskStartDate.value.trim()==""){taskStartDate.focus(); return false;}
	 if(taskEndDate.value.trim()==""){taskEndDate.focus(); return false;}
	 return true;
}
</script>
</th:block>
</body>
</html>
