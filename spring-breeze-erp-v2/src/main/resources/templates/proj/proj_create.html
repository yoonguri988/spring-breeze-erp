<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>프로젝트 생성</title>
</head>
<body>
<th:block layout:fragment="content">
<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb"><a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 업무 <i class="bi bi-chevron-right"></i> 프로젝트 <i class="bi bi-chevron-right"></i> 생성</div>
    <h1>프로젝트 생성</h1>
    <p>새로운 프로젝트의 기본 정보를 입력하세요.</p>
  </div>
</div>

<div class="sb-card">
  <div class="sb-card__body">
    <form th:action="@{/proj/proj_create}" method="post" onsubmit="return check()">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="mb-3">
        <label for="pro_name" class="sb-form-label">프로젝트명</label>
        <input type="text" id="pro_name" name="proName" class="form-control" placeholder="프로젝트명을 입력하세요"/>
      </div>

      <div class="mb-3">
        <label for="pro_desc" class="sb-form-label">프로젝트 설명</label>
        <textarea id="pro_desc" name="proDesc" class="form-control" rows="4" placeholder="프로젝트에 대한 설명을 입력하세요"></textarea>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label for="pro_status" class="sb-form-label">상태</label>
          <select id="pro_status" name="proStatus" class="form-select">
            <option value="" disabled selected>상태를 선택하세요</option>
            <option value="TODO">TODO</option>
            <option value="DOING">DOING</option>
            <option value="DONE">DONE</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="start_date" class="sb-form-label">시작일</label>
          <input type="date" id="start_date" name="startDate" class="form-control" />
        </div>
        <div class="col-md-4">
          <label for="end_date" class="sb-form-label">종료일</label>
          <input type="date" id="end_date" name="endDate" class="form-control" />
        </div>
      </div>

      <div class="mb-4">
        <label for="reg_date" class="sb-form-label">등록일</label>
        <input type="text" id="reg_date" class="form-control"
               th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
               readonly style="max-width:200px;background:#fafbfc;" />
      </div>

      <div class="sb-divider"></div>

      <div class="d-flex justify-content-end gap-2">
        <button type="reset" class="btn btn-ghost" title="글취소">취소</button>
        <a th:href="@{/proj/proj_list}" class="btn btn-ghost" title="목록보러가기">목록</a>
        <button type="submit" class="btn btn-sb" title="등록">등록</button>
      </div>
    </form>
  </div>
</div>
</main>
<script>
function check(){
	 let proName = document.getElementById("pro_name");
	 let proDesc = document.getElementById("pro_desc");
	 let proStatus = document.getElementById("pro_status");
	 let startDate = document.getElementById("start_date");
	 let endDate = document.getElementById("end_date");

	 if(proName.value.trim()==""){proName.focus(); return false;}
	 if(proDesc.value.trim()==""){proDesc.focus(); return false;}
	 if(proStatus.value.trim()==""){proStatus.focus(); return false;}
	 if(startDate.value.trim()==""){startDate.focus(); return false;}
	 if(endDate.value.trim()==""){endDate.focus(); return false;}
	 return true;
}
</script>
</th:block>
</body>
</html>
