<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>프로젝트 상세조회</title>
</head>
<body>
<th:block layout:fragment="content">
<script th:inline="javascript">
window.addEventListener("load",function(){
	let result = /*[[${result}]]*/ '';
	console.log(result);

	if(result=="프로젝트 수정 실패"||result=="태스크 등록 실패"||result=="태스크 삭제 실패"){alert(result); history.go(-1);}
	else if (result.length!=0){alert(result);}
});
</script>
<main class="sb-content">
<div class="sb-page-head">
  <div class="sb-page-head__txt">
    <div class="sb-breadcrumb"><a th:href="@{/}">홈</a> <i class="bi bi-chevron-right"></i> 업무 <i class="bi bi-chevron-right"></i> 프로젝트 <i class="bi bi-chevron-right"></i> 상세</div>
    <h1>프로젝트 상세조회</h1>
    <p>프로젝트의 기본정보, 태스크, 참여인원을 확인합니다.</p>
  </div>
  <div class="sb-page-head__actions">
    <a th:href="@{/proj/proj_list}" class="btn btn-ghost btn-sm"><i class="bi bi-list"></i> 목록</a>
    <a th:href="@{/proj/proj_edit(pro_id=${dto.proId})}" class="btn btn-ghost btn-sm"><i class="bi bi-pencil"></i> 수정</a>
    <button type="button" th:if="${isAdmin or dto.empId == loginEmpId}" class="btn btn-ghost btn-sm" style="color:var(--sb-red)" data-bs-toggle="modal" data-bs-target="#exampleModal"><i class="bi bi-trash3"></i> 삭제</button>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title fs-5" id="exampleModalLabel">정말 삭제하시겠습니까?</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        프로젝트를 삭제하면 관련 데이터가
        모두 삭제되며, 복구할 수 없습니다.
        계속 진행하시겠습니까?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">취소</button>
        <a th:href="@{/proj/delete(pro_id=${dto.proId})}" class="btn btn-danger">삭제</a>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-md-7">
    <div class="sb-card">
      <div class="sb-card__head"><h2>기본정보</h2></div>
      <div class="sb-card__body--flush">
        <table class="sb-table">
          <tr><th style="width:30%">프로젝트명</th><td class="sb-table__name" th:text="${dto.proName}"></td></tr>
          <tr><th>설명</th><td class="sb-table__muted" th:text="${dto.proDesc}"></td></tr>
          <tr><th>상태</th><td>
            <span th:class="${dto.proStatus=='DONE'} ? 'sb-badge sb-badge--green' : (${dto.proStatus=='DOING'} ? 'sb-badge sb-badge--blue' : 'sb-badge sb-badge--gray')">
              <span class="pip"></span><span th:text="${dto.proStatus}"></span>
            </span>
          </td></tr>
          <tr><th>생성자</th><td th:text="${dto.empName}"></td></tr>
          <tr><th>시작일</th><td class="tnum" th:text="${#temporals.format(dto.startDate, 'yyyy-MM-dd')}"></td></tr>
		  <tr><th>종료일</th><td class="tnum" th:text="${#temporals.format(dto.endDate, 'yyyy-MM-dd')}"></td></tr>
		  <tr><th>등록일</th><td class="tnum" th:text="${#temporals.format(dto.createdAt, 'yyyy-MM-dd')}"></td></tr>
        </table>
      </div>
    </div>
  </div>

  <div class="col-md-5">
    <div class="sb-card">
      <div class="sb-card__head">
        <h2>태스크목록</h2>
        <div class="right">
          <a th:href="@{/proj/task_create(project_pro_id=${dto.proId})}" class="btn btn-sb btn-sm"><i class="bi bi-plus-lg"></i> 태스크추가</a>
        </div>
      </div>
      <div class="sb-card__body--flush">
        <table class="sb-table">
          <thead>
            <tr><th>번호</th><th>업무명</th><th>상태</th><th>등록일</th></tr>
          </thead>
          <tbody>
            <tr th:each="task, status : ${list}">
                <td class="sb-table__muted" th:text="${status.count}"></td>
                <td><a th:href="@{/proj/task_detail(task_id=${task.taskId})}" class="sb-table__name" th:text="${task.taskName}"></a></td>
                <td>
                  <span th:class="${task.taskStatus=='DONE'} ? 'sb-badge sb-badge--green' : (${task.taskStatus=='DOING'} ? 'sb-badge sb-badge--blue' : 'sb-badge sb-badge--gray')">
                    <span class="pip"></span><span th:text="${task.taskStatus}"></span>
                  </span>
                </td>
                <td class="sb-hr-cell tnum" th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd')}"></td>
            </tr>
          </tbody>
        </table>
        <div class="sb-empty" th:if="${#lists.isEmpty(list)}"><i class="bi bi-list-check"></i><p>등록된 태스크가 없습니다.</p></div>
      </div>
    </div>
  </div>
</div>

<div class="sb-card mt-3">
  <div class="sb-card__head"><h2>참여인원</h2></div>
  <div class="sb-card__body">
    <div class="sb-avstack mb-2">
      <span class="sb-avatar" th:each="m : ${memberList}" th:title="${m.empName}" th:text="${#strings.substring(m.empName,0,1)}"></span>
    </div>
    <span class="text-faint" style="font-size:13px">
      <th:block th:each="m, status : ${memberList}">[[${m.empName}]]<th:block th:unless="${status.last}">, </th:block></th:block>
      <th:block th:if="${#lists.isEmpty(memberList)}">참여 인원이 없습니다.</th:block>
    </span>
  </div>
</div>
</main>
</th:block>
</body>
</html>
