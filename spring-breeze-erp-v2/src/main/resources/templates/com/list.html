<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
<title>회사 목록 페이지</title>
</head>
<body>
<main layout:fragment="content" class="sb-content">
<!-- 페이지 헤더 -->
<div class="sb-page-head">
    <div class="sb-page-head__txt">
        <div class="sb-breadcrumb">
        	조직 관리
            <i class="bi bi-chevron-right"></i>
            회사 관리
            <i class="bi bi-chevron-right"></i>
            목록
        </div>
        <h1>회사 관리</h1>
        <p>등록된 회사를 조회하고 관리합니다.</p>
    </div>
    <div class="sb-page-head__actions">
        <a th:href="@{/com/add}" class="btn btn-sb btn-sm">
            <i class="bi bi-plus-lg"></i> 회사 등록
        </a>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-sm-6 col-lg-3">
        <div class="sb-stat">
            <div class="sb-stat__top">
                <div class="sb-stat__ico tone-blue"><i class="bi bi-building"></i></div>
                <div class="sb-stat__label">전체 회사</div>
            </div>
            <div class="sb-stat__val" id="comTotal" th:text="${stats.comTotal}">-</div>
        </div>
    </div>
    <div class="col-sm-6 col-lg-3">
        <div class="sb-stat">
            <div class="sb-stat__top">
                <div class="sb-stat__ico tone-green"><i class="bi bi-people"></i></div>
                <div class="sb-stat__label">전체 임직원</div>
            </div>
            <div class="sb-stat__val" id="empTotal" th:text="${stats.empTotal}">-</div>
        </div>
    </div>
    <div class="col-sm-6 col-lg-3">
        <div class="sb-stat">
            <div class="sb-stat__top">
                <div class="sb-stat__ico tone-violet"><i class="bi bi-grid-3x3-gap"></i></div>
                <div class="sb-stat__label">업종 수</div>
            </div>
            <div class="sb-stat__val" id="industTotal" th:text="${stats.industTotal}">-</div>
        </div>
    </div>
    <div class="col-sm-6 col-lg-3">
        <div class="sb-stat">
            <div class="sb-stat__top">
                <div class="sb-stat__ico tone-amber"><i class="bi bi-calendar-plus"></i></div>
                <div class="sb-stat__label">최근 등록 회사</div>
            </div>
            <div class="sb-stat__val" id="comLatest" style="font-size:15px;line-height:1.3" th:text="${stats.comLatest}">-</div>
        </div>
    </div>
</div>

<!-- 목록 카드 -->
<div class="sb-card">
    <form method="GET" th:action="@{/com/list}"
          id="searchForm" class="sb-toolbar">
        <div class="ac-wrap grow" style="max-width:460px">
            <div class="sb-field sb-field--search" style="width:100%">
                <i class="bi bi-search"></i>
                <input type="text" id="keyword" name="keyword"
                       th:value="${param.keyword}"
                       placeholder="회사명 또는 사업자번호로 검색"
                       autocomplete="off" style="width:100%">
            </div>
            <div class="ac-list" id="acList"></div>
        </div>

		<!-- 오른쪽 정렬용 스페이서: 이 아래 항목들을 우측으로 밀어줌 -->
		<div class="grow"></div>

		<div class="sb-field">
		    <select id="comIndustry" name="industCode"
                    onchange="document.getElementById('pageHidden').value='1'; this.form.submit();">
                <option value="">전체 업종</option>
                <optgroup label="IT · 플랫폼">
                    <option value="IT001" th:selected="${param.industCode == 'IT001'}">IT·플랫폼</option>
                    <option value="IT002" th:selected="${param.industCode == 'IT002'}">IT·서비스</option>
                </optgroup>
                <optgroup label="이커머스">
                    <option value="ECOM001" th:selected="${param.industCode == 'ECOM001'}">이커머스</option>
                    <option value="ECOM002" th:selected="${param.industCode == 'ECOM002'}">이커머스·대형</option>
                </optgroup>
                <optgroup label="O2O · 배달">
                    <option value="O2O001" th:selected="${param.industCode == 'O2O001'}">O2O·배달</option>
                    <option value="O2O002" th:selected="${param.industCode == 'O2O002'}">O2O·여행</option>
                    <option value="O2O003" th:selected="${param.industCode == 'O2O003'}">O2O·홈리빙</option>
                </optgroup>
                <optgroup label="금융 · 카드">
                    <option value="FIN001" th:selected="${param.industCode == 'FIN001'}">금융·카드</option>
                    <option value="FIN002" th:selected="${param.industCode == 'FIN002'}">금융·IT</option>
                </optgroup>
                <optgroup label="통신">
                    <option value="TELCO001" th:selected="${param.industCode == 'TELCO001'}">통신</option>
                    <option value="TELCO002" th:selected="${param.industCode == 'TELCO002'}">통신·인터넷</option>
                </optgroup>
                <optgroup label="게임">
                    <option value="GAME001" th:selected="${param.industCode == 'GAME001'}">게임</option>
                    <option value="GAME002" th:selected="${param.industCode == 'GAME002'}">게임·모바일</option>
                </optgroup>
                <optgroup label="IT · SI / 솔루션">
                    <option value="SI001" th:selected="${param.industCode == 'SI001'}">IT·SI</option>
                    <option value="SI002" th:selected="${param.industCode == 'SI002'}">IT·솔루션</option>
                </optgroup>
                <optgroup label="반도체 · 전자">
                    <option value="ELEC001" th:selected="${param.industCode == 'ELEC001'}">반도체·전자</option>
                    <option value="ELEC002" th:selected="${param.industCode == 'ELEC002'}">디스플레이</option>
                </optgroup>
                <optgroup label="물류 · 유통">
                    <option value="DIST001" th:selected="${param.industCode == 'DIST001'}">물류</option>
                    <option value="DIST002" th:selected="${param.industCode == 'DIST002'}">유통</option>
                </optgroup>
                <optgroup label="미디어 · 콘텐츠">
                    <option value="MEDIA001" th:selected="${param.industCode == 'MEDIA001'}">미디어·콘텐츠</option>
                    <option value="MEDIA002" th:selected="${param.industCode == 'MEDIA002'}">엔터테인먼트</option>
                </optgroup>
                <optgroup label="바이오 · 헬스케어">
                    <option value="BIO001" th:selected="${param.industCode == 'BIO001'}">바이오</option>
                    <option value="BIO002" th:selected="${param.industCode == 'BIO002'}">제약</option>
                </optgroup>
                <optgroup label="건설 · 부동산">
                    <option value="CONST001" th:selected="${param.industCode == 'CONST001'}">건설</option>
                    <option value="CONST002" th:selected="${param.industCode == 'CONST002'}">건설·개발</option>
                </optgroup>
                <optgroup label="에너지">
                    <option value="ENRG001" th:selected="${param.industCode == 'ENRG001'}">에너지·정유</option>
                    <option value="ENRG002" th:selected="${param.industCode == 'ENRG002'}">에너지·전력</option>
                </optgroup>
                <optgroup label="교육 · HR">
                    <option value="EDU001" th:selected="${param.industCode == 'EDU001'}">교육</option>
                    <option value="EDU002" th:selected="${param.industCode == 'EDU002'}">교육·HR</option>
                </optgroup>
                <optgroup label="자동차">
                    <option value="AUTO001" th:selected="${param.industCode == 'AUTO001'}">자동차</option>
                </optgroup>
            </select>
		</div>

		<div class="sb-field">
		    <select class="form-select form-select-sm" style="width:auto"
		            id="onepagelist" name="onepagelist"
		            onchange="document.getElementById('pageHidden').value='1'; this.form.submit();">
		        <option value="10" th:selected="${paging.onepagelist == 10 || paging.onepagelist == null}">10개씩 보기</option>
		        <option value="30" th:selected="${paging.onepagelist == 30}">30개씩 보기</option>
		        <option value="50" th:selected="${paging.onepagelist == 50}">50개씩 보기</option>
		    </select>
		</div>

        <button type="submit" class="btn btn-sb btn-sm">
            <i class="bi bi-search"></i> 검색
        </button>
        <a th:if="${param.keyword != null}" class="btn btn-ghost btn-sm" th:href="@{/com/list}">초기화</a>
        <input type="hidden" name="page" id="pageHidden" value="1">
    </form>

    <!-- 테이블 -->
    <div class="sb-card__body--flush">
        <table class="sb-table">
            <thead>
                <tr>
                    <th style="width:60px">번호</th>
                    <th>회사명</th>
                    <th style="width:90px">대표자</th>
                    <th style="width:140px">사업자번호</th>
                    <th>업종</th>
                    <th class="num" style="width:110px">
                        임직원 수
                    </th>
                    <th style="width:170px; text-align: center">관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(items)}">
                    <td colspan="7">
                        <div class="sb-empty">
                            <i class="bi bi-inbox"></i>
                            <p>등록된 회사가 없습니다.</p>
                        </div>
                    </td>
                </tr>

                <tr th:each="com,status : ${items}">
                    <td class="sb-hr-cell tnum" th:text="${paging.listtotal - paging.pstartno - status.index}"></td>
                    <td>
                        <div class="sb-rowuser">
                            <span class="sb-avatar" style="border-radius:9px">
                                <img th:if="${com.comLogo != null}" th:src="@{${com.comLogo}}" alt=""
                                     style="width:100%;height:100%;object-fit:cover">
                                <i th:unless="${com.comLogo != null}" class="bi bi-building"></i>
                            </span>
                            <div>
                                <div class="sb-table__name" th:text="${com.comName}"></div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${com.comCeo}"></td>
                    <td class="sb-hr-cell tnum" th:text="${com.bizNo}"></td>
                    <td>
                        <span th:if="${com.industName != null}" class="sb-badge sb-badge--gray"
                              style="font-size:11.5px" th:text="${com.industName}"></span>
                        <span th:unless="${com.industName != null}" class="text-faint">-</span>
                    </td>
                    <td class="num tnum">
                        <span class="text-faint" th:text="${com.empCount}"></span>
                    </td>
                    <td>
                        <div class="d-flex justify-content-end gap-1">
                            <a class="sb-iconbtn" th:href="@{/com/detail(comId=${com.comId})}" title="상세보기">
                                <i class="bi bi-book"></i>
                            </a>
                            <a class="sb-iconbtn" th:href="@{/com/edit(comId=${com.comId})}" title="수정">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a class="sb-iconbtn" th:href="@{/dept/list(comId=${com.comId})}" title="조직도 보기">
                                <i class="bi bi-diagram-3"></i>
                            </a>
                            <button type="button" class="sb-iconbtn com-del"
                                    style="color:var(--sb-red)"
                                    th:attr="data-id=${com.comId}, data-name=${com.comName}"
                                    title="삭제">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
		<div id="modalContainer"></div>
    </div>

    <!-- 페이지네이션 -->
    <div class="d-flex align-items-center justify-content-between px-3 py-2"
         style="border-top:1px solid var(--sb-border)">
        <span class="text-faint" style="font-size:12.5px">
            총 <b th:text="${paging.listtotal}"></b>개 회사
        </span>
        <nav th:if="${paging.pagetotal > 1}" aria-label="페이지 이동">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${paging.start <= 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/com/list(keyword=${param.keyword}, onepagelist=${paging.onepagelist}, pstartno=${paging.start - 1})}"
                       aria-label="이전"><i class="bi bi-chevron-left"></i></a>
                </li>

                <li class="page-item" th:each="p : ${#numbers.sequence(paging.start, paging.end)}"
                    th:classappend="${p == paging.pstartno} ? 'active'">
                    <a class="page-link"
                       th:href="@{/com/list(keyword=${param.keyword}, onepagelist=${paging.onepagelist}, pstartno=${p})}"
                       th:text="${p}"></a>
                </li>

                <li class="page-item" th:classappend="${paging.end >= paging.pagetotal} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/com/list(keyword=${param.keyword}, onepagelist=${paging.onepagelist}, pstartno=${paging.end + 1})}"
                       aria-label="다음"><i class="bi bi-chevron-right"></i></a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</main>
<script th:inline="javascript">
(function () {
    "use strict";

    document.addEventListener("layout:ready", function () {
    	SB.countUp(document.getElementById("comTotal"), 0);
    	SB.countUp(document.getElementById("empTotal"), 0);
    	SB.countUp(document.getElementById("industTotal"), 0);
        document.getElementById("comLatest").textContent = "-";
    });

    /* ===================== 실시간 자동완성 ===================== */
    const kwInput = document.getElementById("keyword");
    const acList  = document.getElementById("acList");
    let debounceTimer = null;
    let acIndex = -1;

    kwInput.addEventListener("input", function () {
        const kw = this.value.trim();
        clearTimeout(debounceTimer);
        if (!kw) { hideAc(); return; }
        debounceTimer = setTimeout(() => fetchSuggest(kw), 220);
    });

    kwInput.addEventListener("keydown", function (e) {
        const items = [...acList.querySelectorAll(".ac-item")];
        if (!items.length) return;
        if (e.key === "ArrowDown") { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); }
        else if (e.key === "ArrowUp") { e.preventDefault(); acIndex = Math.max(acIndex - 1, 0); }
        else if (e.key === "Enter" && acIndex >= 0) { e.preventDefault(); items[acIndex].dispatchEvent(new Event("mousedown")); return; }
        else return;
        items.forEach((it, i) => it.classList.toggle("active", i === acIndex));
    });

    document.addEventListener("click", function (e) {
        if (!kwInput.contains(e.target) && !acList.contains(e.target)) hideAc();
    });

    function fetchSuggest(kw) {
        fetch("/com/suggest?keyword=" + encodeURIComponent(kw))
            .then(function (res) {
                if (!res.ok) throw new Error("network error");
                return res.json();
            })
            .then(function (data) { renderAc(data, kw); })
            .catch(hideAc);
    }

    function renderAc(data, kw) {
        acList.innerHTML = "";
        acIndex = -1;

        if (!data || data.length === 0) {
            acList.innerHTML = '<div class="ac-empty">일치하는 회사가 없습니다.</div>';
            acList.classList.add("show");
            return;
        }

        data.forEach(function (item) {
            const div = document.createElement("div");
            div.className = "ac-item";
            div.innerHTML =
                '<i class="bi bi-building text-faint"></i>'
                + '<span>' + highlight(item.comName, kw) + '</span>'
                + '<span class="ac-item__meta">' + (item.bizNo || "") + '</span>';

            div.addEventListener("mousedown", function (e) {
                e.preventDefault(); // blur 방지
                kwInput.value = item.comName;
                hideAc();
                document.getElementById("searchForm").submit();
            });

            acList.appendChild(div);
        });

        acList.classList.add("show");
    }

    function highlight(text, kw) {
        if (!kw) return text;
        const escaped = kw.replace(/[.*+?^$\x7B\x7D()|[\]\\]/g, "\\$&");
        return text.replace(new RegExp("(" + escaped + ")", "gi"), "<b>$1</b>");
    }

    function hideAc() {
        acList.classList.remove("show");
        acList.innerHTML = "";
        acIndex = -1;
    }

    document.addEventListener("click", function (e) {
        const delBtn = e.target.closest(".com-del");
        if (!delBtn) return;

        const comId = delBtn.dataset.id;

        fetch("/com/delete?comId=" + comId)
            .then(res => res.text())
            .then(html => {
                const container = document.getElementById("modalContainer");
                container.innerHTML =
                    '<div class="modal fade" id="deleteModal" tabindex="-1">' +
                    '  <div class="modal-dialog"><div class="modal-content">' + html + '</div></div>' +
                    '</div>';

                const modalEl = document.getElementById("deleteModal");
                const csrfInput = modalEl.querySelector("#csrfToken");
                const modal = new bootstrap.Modal(modalEl);
                modal.show();

                const empPass   = modalEl.querySelector("#empPass");
                const pwErr     = modalEl.querySelector("#delPwErr");
                const pwErrMsg  = modalEl.querySelector("#delPwErrMsg");
                const delYesBtn = modalEl.querySelector("#delYes");

                setTimeout(() => empPass.focus(), 300);

                empPass.addEventListener("input", () => {
                    pwErr.style.display = "none";
                    empPass.classList.remove("is-invalid");
                });
                empPass.addEventListener("keydown", ev => {
                    if (ev.key === "Enter") { ev.preventDefault(); delYesBtn.click(); }
                });

                delYesBtn.addEventListener("click", () => {
                    fetch("/com/delete", {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: "comId=" + encodeURIComponent(comId)
                            + "&empPass=" + encodeURIComponent(empPass.value)
                            + "&" + csrfInput.name + "=" + encodeURIComponent(csrfInput.value)
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            location.href = "/com/list";
                        } else {
                            pwErrMsg.textContent = data.message;
                            pwErr.style.display = "";
                            empPass.classList.add("is-invalid");
                            empPass.focus();
                        }
                    })
                    .catch(() => alert("삭제 처리 중 오류가 발생했습니다."));
                });
            })
            .catch(() => alert("모달을 불러오지 못했습니다."));
    });
})();
</script>
</body>
</html>
