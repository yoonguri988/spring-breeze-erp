<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
 
  <div th:fragment="cancelModal" class="modal fade" id="cancelModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form th:action="@{/resv/cancel}" method="post" id="cancelForm">
          <div class="modal-header">
            <h5 class="modal-title">예약 취소</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="revId" id="cancelRevId">
            <!-- emp.css 의 sb-confirm-box 패턴 재사용 (위험 액션 확인 UI) -->
            <div class="sb-confirm-box" style="margin-bottom:0">
              <div class="sb-confirm-box__icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
              <div class="sb-confirm-box__text">
                <p class="sb-confirm-box__title">이 예약을 취소하시겠습니까?</p>
                <p class="sb-confirm-box__desc">취소 후에는 되돌릴 수 없으며, 다시 이용하려면 새로 예약을 신청해야 합니다.</p>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">닫기</button>
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-x-lg"></i> 예약 취소
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
 
  <th:block th:fragment="cancelModalScript">
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const cancelModalEl = document.getElementById('cancelModal');
      if (!cancelModalEl) return;
 
      const cancelRevId = document.getElementById('cancelRevId');
 
      // 취소 버튼 클릭 시 모달의 hidden revId 채우기
      // - detail.html 등: class="btn-cancel-resv" + data-rev-id
      // - my.html/list.html 등 목록 아이콘 버튼: class="resv-del" + data-id
      document.querySelectorAll('.btn-cancel-resv, .resv-del').forEach(function (btn) {
        btn.addEventListener('click', function () {
          cancelRevId.value = this.dataset.revId || this.dataset.id;
        });
      });
    });
  </script>
  </th:block>
 
</body>
</html>
